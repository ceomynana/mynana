<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Nana — Nómina y Contratos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#1A6B52;--g2:#0F4A38;--g3:#F0F7F4;--g4:#E1F0EB;--b:#D4A5A5;--b2:#BF9090;--b3:#F7EFEF;--cr:#F9F5F0;--txt:#1A2E25;--txt2:#4A6358;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--txt);overflow-x:hidden;min-height:100vh;min-height:100dvh;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--g2);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .4s;}
#splash.oculto{opacity:0;pointer-events:none;}

/* NO AUTH */
#noAuth{position:fixed;inset:0;background:var(--g2);z-index:998;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:16px;}
#noAuth.visible{display:flex;}

/* HEADER */
.app-header{background:var(--g2);padding:48px 20px 16px;position:sticky;top:0;z-index:50;}
@media(min-width:768px){.app-header{padding-top:16px;}}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.header-logo{font-family:'Cormorant Garamond',serif;font-size:20px;color:#fff;}
.header-logo em{color:var(--b);font-style:normal;}
.header-back{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);font-size:13px;padding:7px 14px;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;}

/* TABS */
.tabs{display:flex;background:var(--g2);padding:0 20px 14px;gap:8px;}
.tab{flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .2s;}
.tab.activo{background:var(--b);border-color:var(--b);color:#fff;}

/* LAYOUT */
.layout{max-width:1100px;margin:0 auto;padding:20px 16px 80px;}
@media(min-width:900px){.layout{display:grid;grid-template-columns:1fr 380px;gap:20px;}}

/* PANEL */
.panel{background:#fff;border-radius:var(--r);border:1px solid var(--g4);overflow:hidden;margin-bottom:16px;}
.panel-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g4);}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--txt);}
.panel-sub{font-size:12px;color:var(--txt2);margin-top:2px;}
.panel-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;}

/* CONFIGURACIÓN NANA */
.config-form{padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;}
.form-input{background:var(--cr);border:1.5px solid var(--g4);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);outline:none;width:100%;}
.form-input:focus{border-color:var(--g);background:#fff;}
.form-select{width:100%;background:var(--cr);border:1.5px solid var(--g4);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);outline:none;appearance:none;cursor:pointer;}
.form-select:focus{border-color:var(--g);}
.btn-calc{width:100%;background:var(--g);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:13px;border-radius:99px;border:none;cursor:pointer;transition:all .2s;}
.btn-calc:hover{background:var(--g2);}

/* RESULTADO NÓMINA */
.nomina-resultado{padding:16px 18px;}
.nomina-mes{font-size:12px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;}
.nomina-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--cr);border-radius:8px;margin-bottom:6px;border:1px solid var(--g4);}
.nomina-row.desc{background:var(--b3);border-color:#EDE0E0;}
.nomina-row.total{background:var(--g);border-radius:10px;margin-top:10px;}
.nomina-label{font-size:13px;color:var(--txt2);}
.nomina-label.total{color:#fff;font-weight:600;}
.nomina-valor{font-size:14px;font-weight:500;color:var(--txt);}
.nomina-valor.positivo{color:var(--g);}
.nomina-valor.negativo{color:var(--b2);}
.nomina-valor.total{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#fff;}
.nomina-sep{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px;}
.btn-pagar{width:100%;background:var(--g);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:13px;border-radius:99px;border:none;cursor:pointer;margin-top:14px;transition:all .2s;}
.btn-pagar:hover{background:var(--g2);}
.btn-recibo{width:100%;background:var(--g3);color:var(--g);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:11px;border-radius:99px;border:none;cursor:pointer;margin-top:8px;}

/* DÍAS TRABAJADOS */
.dias-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:14px 18px;}
.dia-header{font-size:10px;text-align:center;color:var(--txt2);font-weight:600;padding:4px 0;}
.dia-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:1.5px solid var(--g4);background:#fff;font-weight:500;color:var(--txt2);transition:all .15s;}
.dia-cell.trabajado{background:var(--g);border-color:var(--g);color:#fff;}
.dia-cell.libre{background:var(--b3);border-color:var(--b);color:var(--b2);}
.dia-cell.vacio{background:transparent;border-color:transparent;cursor:default;}
.dia-cell.hoy{border-color:var(--g);font-weight:600;}
.dias-resumen{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 18px 14px;}
.dias-stat{background:var(--cr);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--g4);}
.dias-stat-n{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--g);}
.dias-stat-l{font-size:11px;color:var(--txt2);margin-top:3px;}

/* CONTRATO */
.contrato-wrap{padding:16px 18px;}
.contrato-tipo-sel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.tipo-btn{padding:10px;border-radius:10px;border:1.5px solid var(--g4);background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;text-align:center;transition:all .2s;}
.tipo-btn.activo{background:var(--g);border-color:var(--g);color:#fff;}
.contrato-preview{background:var(--cr);border-radius:10px;padding:16px;border:1px solid var(--g4);font-size:12px;color:var(--txt2);line-height:1.8;margin-bottom:14px;white-space:pre-wrap;max-height:300px;overflow-y:auto;}
.contrato-preview strong{color:var(--txt);}
.btn-descargar{width:100%;background:var(--g2);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:13px;border-radius:99px;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-descargar:hover{background:var(--g);}

/* HISTORIAL PAGOS */
.pago-item{padding:12px 18px;border-bottom:1px solid var(--g4);display:flex;align-items:center;gap:12px;}
.pago-item:last-child{border-bottom:none;}
.pago-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.pago-info{flex:1;}
.pago-desc{font-size:13px;font-weight:500;color:var(--txt);}
.pago-fecha{font-size:11px;color:#bbb;margin-top:2px;}
.pago-monto{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--g);}
.pago-estado{font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;}

/* MODAL REGISTRAR PAGO */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.oculto{display:none;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 20px 40px;}
@media(min-width:768px){.modal-overlay{align-items:center;}.modal-box{border-radius:20px;}}
.modal-title{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:16px;}
.modal-cancel{width:100%;background:transparent;border:1px solid var(--g4);border-radius:99px;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt2);cursor:pointer;margin-top:10px;}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--g);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:99px;z-index:300;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 16px rgba(26,107,82,.3);}
.toast.visible{transform:translateX(-50%) translateY(0);}

.empty-state{text-align:center;padding:32px 20px;}
.empty-icon{font-size:36px;margin-bottom:10px;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div style="width:72px;height:72px;border-radius:50%;background:var(--g);border:3px solid var(--b);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:24px;color:#fff;">MN</div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;">NANA</div>
  <div style="font-size:13px;color:rgba(255,255,255,.5);">Cargando nómina...</div>
</div>

<!-- NO AUTH -->
<div id="noAuth">
  <div style="font-family:'Cormorant Garamond',serif;font-size:24px;color:#fff;">My <span style="color:#D4A5A5;">Nana</span></div>
  <div style="font-size:14px;color:rgba(255,255,255,.6);text-align:center;">Necesitas iniciar sesión</div>
  <a href="/app.html" style="background:var(--b);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:14px 32px;border-radius:99px;border:none;cursor:pointer;text-decoration:none;display:inline-block;">Iniciar sesión →</a>
</div>

<!-- MODAL REGISTRAR PAGO -->
<div class="modal-overlay oculto" id="modalPago">
  <div class="modal-box">
    <div class="modal-title">Registrar pago realizado</div>
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label">Concepto</label>
      <select class="form-select" id="pagoConcepto">
        <option value="Salario mensual">Salario mensual</option>
        <option value="Quincena">Quincena</option>
        <option value="Décimo tercer mes">Décimo tercer mes</option>
        <option value="Vacaciones">Vacaciones</option>
        <option value="Prima de antigüedad">Prima de antigüedad</option>
        <option value="Pago por días">Pago por días trabajados</option>
        <option value="Otro">Otro</option>
      </select>
    </div>
    <div class="form-row" style="margin-bottom:12px;">
      <div class="form-group">
        <label class="form-label">Monto ($)</label>
        <input type="number" class="form-input" id="pagoMonto" placeholder="0.00" step="0.01" />
      </div>
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-input" id="pagoFecha" />
      </div>
    </div>
    <div class="form-group" style="margin-bottom:14px;">
      <label class="form-label">Nota (opcional)</label>
      <input type="text" class="form-input" id="pagoNota" placeholder="Ej: Pago quincena 1-15 mayo" />
    </div>
    <button class="btn-calc" onclick="guardarPago()">Registrar pago →</button>
    <button class="modal-cancel" onclick="cerrarModalPago()">Cancelar</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="app-header" id="appHeader" style="display:none;">
  <div class="header-top" style="margin-bottom:12px;">
    <div class="header-logo">My <em>Nana</em> — Nómina</div>
    <a href="/app.html" class="header-back">← Dashboard</a>
  </div>
  <!-- TABS -->
  <div class="tabs">
    <button class="tab activo" onclick="cambiarTab('nomina',this)">💰 Nómina</button>
    <button class="tab" onclick="cambiarTab('dias',this)">📅 Días</button>
    <button class="tab" onclick="cambiarTab('contrato',this)">📋 Contrato</button>
    <button class="tab" onclick="cambiarTab('pagos',this)">🧾 Pagos</button>
  </div>
</div>

<!-- CONTENIDO -->
<div id="appContent" style="display:none;">
  <div class="layout">
    <div id="tabContenido"></div>
    <div id="tabLateral"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, getDocs, orderBy, onSnapshot, serverTimestamp, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyDDJRJ8A8P507lllGRBOoXO30ESAH1GAnw",
  authDomain:"mynanapapp.firebaseapp.com",
  projectId:"mynanapapp",
  storageBucket:"mynanapapp.firebasestorage.app",
  messagingSenderId:"124180779437",
  appId:"1:124180779437:web:d217743000b0f1fedfd124"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioActual = null;
let perfilActual = null;
let nanaVinculada = null;
let hogarId = null;
let tabActual = 'nomina';
let diasTrabajados = {};
let pagosHistorial = [];
let tipoContrato = 'fija';

const MES_ACTUAL = new Date().toLocaleString('es-PA', { month: 'long', year: 'numeric' });
const HOY = new Date();

// ── AUTH ──
onAuthStateChanged(auth, async (user) => {
  document.getElementById('splash').classList.add('oculto');
  if (!user) { document.getElementById('noAuth').classList.add('visible'); return; }
  usuarioActual = user;
  const perfil = await getDoc(doc(db, 'usuarios', user.uid));
  if (!perfil.exists()) { document.getElementById('noAuth').classList.add('visible'); return; }
  perfilActual = perfil.data();

  if (perfilActual.tipo !== 'familia') {
    // Vista especial para la nana — solo puede VER sus pagos
    document.getElementById('appHeader').style.display = 'block';
    document.getElementById('appContent').style.display = 'block';

    // Ocultar tabs de nómina, días y contrato — solo mostrar pagos
    document.querySelector('.tabs').innerHTML = `
      <div style="font-size:13px;color:rgba(255,255,255,.7);padding:4px 0;">
        👩 Vista de trabajadora — tus pagos recibidos
      </div>`;

    await cargarDatos();
    renderVistaNana();
    return;
  }

  document.getElementById('appHeader').style.display = 'block';
  document.getElementById('appContent').style.display = 'block';

  await cargarDatos();
  renderTab('nomina');
});

async function cargarDatos() {
  const qHogar = query(collection(db, 'hogares'), where('participantes', 'array-contains', usuarioActual.uid));
  const snapHogar = await getDocs(qHogar);
  if (!snapHogar.empty) {
    hogarId = snapHogar.docs[0].id;
    const participantes = snapHogar.docs[0].data().participantes || [];
    // Buscar específicamente quien tiene tipo 'nana'
    for (const pUid of participantes) {
      if (pUid === usuarioActual.uid) continue;
      const pSnap = await getDoc(doc(db, 'usuarios', pUid));
      if (pSnap.exists() && pSnap.data().tipo === 'nana') {
        nanaVinculada = { uid: pUid, ...pSnap.data() };
        break;
      }
    }
  }

  // Cargar días trabajados del mes
  const mesKey = `${HOY.getFullYear()}-${String(HOY.getMonth()+1).padStart(2,'0')}`;
  const diasSnap = await getDoc(doc(db, 'hogares', hogarId || 'sin-hogar', 'dias', mesKey));
  if (diasSnap.exists()) diasTrabajados = diasSnap.data().dias || {};

  // Cargar pagos
  if (hogarId) {
    const qPagos = query(collection(db, 'hogares', hogarId, 'pagos'), orderBy('fecha', 'desc'));
    const snapPagos = await getDocs(qPagos);
    pagosHistorial = snapPagos.docs.map(d => ({ id: d.id, ...d.data() }));
  }
}

// ── TABS ──
window.cambiarTab = (tab, btn) => {
  tabActual = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  renderTab(tab);
};

function renderTab(tab) {
  const c = document.getElementById('tabContenido');
  const l = document.getElementById('tabLateral');
  l.innerHTML = '';
  if (tab === 'nomina') renderNomina(c, l);
  else if (tab === 'dias') renderDias(c, l);
  else if (tab === 'contrato') renderContrato(c, l);
  else if (tab === 'pagos') renderPagos(c, l);
}

// ── VISTA NANA ──
function renderVistaNana() {
  const c = document.getElementById('tabContenido');
  const l = document.getElementById('tabLateral');
  const totalRecibido = pagosHistorial.reduce((s, p) => s + (p.monto || 0), 0);

  c.innerHTML = `
    <div class="panel">
      <div class="panel-hdr">
        <div>
          <div class="panel-title">Mis pagos recibidos</div>
          <div class="panel-sub">${pagosHistorial.length} pagos registrados</div>
        </div>
        <div class="panel-badge" style="background:var(--g3);color:var(--g);">
          $${totalRecibido.toFixed(2)} total
        </div>
      </div>
      ${!pagosHistorial.length ? `
        <div class="empty-state">
          <div class="empty-icon">💰</div>
          <div style="font-size:15px;font-weight:500;color:var(--txt);margin-bottom:4px;">Sin pagos registrados aún</div>
          <div style="font-size:13px;color:var(--txt2);">La familia registrará tus pagos aquí</div>
        </div>` :
        pagosHistorial.map(p => {
          const fecha = p.fecha?.toDate
            ? p.fecha.toDate().toLocaleDateString('es-PA')
            : p.fecha || '';
          return `<div class="pago-item">
            <div class="pago-icon" style="background:var(--g3);">💰</div>
            <div class="pago-info">
              <div class="pago-desc">${p.concepto}</div>
              <div class="pago-fecha">${fecha}${p.nota ? ' · ' + p.nota : ''}</div>
            </div>
            <div style="text-align:right;">
              <div class="pago-monto">$${parseFloat(p.monto).toFixed(2)}</div>
              <div class="pago-estado" style="background:var(--g3);color:var(--g);">Recibido</div>
            </div>
          </div>`;
        }).join('')}
    </div>`;

  l.innerHTML = `
    <div class="panel">
      <div class="panel-hdr"><div class="panel-title">Mi resumen</div></div>
      <div style="padding:16px 18px;display:flex;flex-direction:column;gap:12px;">
        <div style="background:var(--g2);border-radius:12px;padding:18px;text-align:center;">
          <div style="font-size:12px;color:rgba(255,255,255,.55);margin-bottom:6px;">Total recibido</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;color:#fff;">
            $${totalRecibido.toFixed(2)}
          </div>
          <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;">
            ${pagosHistorial.length} pagos registrados
          </div>
        </div>

        <!-- Desglose por concepto -->
        ${pagosHistorial.length > 0 ? `
          <div style="background:var(--cr);border-radius:10px;padding:12px 14px;border:1px solid var(--g4);">
            <div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;">Por concepto</div>
            ${Object.entries(pagosHistorial.reduce((acc, p) => {
              acc[p.concepto] = (acc[p.concepto] || 0) + p.monto;
              return acc;
            }, {})).map(([concepto, total]) => `
              <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--txt2);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--g4);">
                <span>${concepto}</span>
                <span style="font-weight:500;color:var(--g);">$${total.toFixed(2)}</span>
              </div>`).join('')}
          </div>` : ''}

        <!-- Tus derechos -->
        <div style="background:var(--g3);border-radius:10px;padding:14px;border:1px solid var(--g4);">
          <div style="font-size:12px;font-weight:600;color:var(--g);margin-bottom:10px;">📋 Tus derechos laborales</div>
          ${[
            ['💰','Décimo tercer mes','Se paga en abril, agosto y diciembre'],
            ['🏖️','Vacaciones','30 días por cada 11 meses trabajados'],
            ['🏥','Seguro Social','Tu empleador debe inscribirte en la CSS'],
            ['⭐','Prima de antigüedad','1 semana de salario por año al terminar'],
          ].map(([e,t,d]) => `
            <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;">
              <span style="font-size:16px;flex-shrink:0;">${e}</span>
              <div>
                <div style="font-size:12px;font-weight:500;color:var(--txt);">${t}</div>

window.calcularNomina = () => {
  const tipo = document.getElementById('tipoNomina')?.value || 'fija';
  const salarioBase = parseFloat(document.getElementById('salarioBase')?.value) || 0;
  const anos = parseFloat(document.getElementById('anosAntiguedad')?.value) || 0;
  const diasTrab = parseInt(document.getElementById('diasTrab')?.value) || 0;
  const diasMes = parseInt(document.getElementById('diasMes')?.value) || 30;

  if (!salarioBase) return;

  let salario, decimoMes, vacaciones, primaAntiguedad, cssEmpleador, cssTrabajadora;

  if (tipo === 'fija') {
    salario = diasTrab > 0 ? (salarioBase / diasMes) * diasTrab : salarioBase;
    decimoMes = salarioBase / 12;
    vacaciones = salarioBase / 12;
    primaAntiguedad = anos > 0 ? (salarioBase / 52) * anos : 0;
    cssEmpleador = salario * 0.1225;
    cssTrabajadora = salario * 0.0975;
  } else {
    const salarioDiario = salarioBase;
    salario = salarioDiario * diasTrab;
    decimoMes = salario / 12;
    vacaciones = salario / 12;
    primaAntiguedad = anos > 0 ? (salario / 52) * anos : 0;
    cssEmpleador = salario * 0.1225;
    cssTrabajadora = salario * 0.0975;
    document.getElementById('labelSalario').textContent = 'Salario por día ($)';
  }

  const totalBruto = salario + decimoMes + vacaciones + primaAntiguedad;
  const totalNeto = totalBruto - cssTrabajadora;
  const costoEmpleador = totalBruto + cssEmpleador;

  const fmt = n => `$${n.toFixed(2)}`;

  document.getElementById('resultadoNomina').innerHTML = `
    <div class="panel">
      <div class="panel-hdr">
        <div class="panel-title">Resultado · ${MES_ACTUAL}</div>
        <div class="panel-badge" style="background:var(--g3);color:var(--g);">${diasTrab} días trabajados</div>
      </div>
      <div class="nomina-resultado">
        <div class="nomina-mes">Ingresos</div>
        <div class="nomina-row">
          <span class="nomina-label">Salario ${tipo === 'eventual' ? `(${diasTrab} días × ${fmt(salarioBase)})` : 'proporcional'}</span>
          <span class="nomina-valor positivo">${fmt(salario)}</span>
        </div>
        <div class="nomina-row">
          <span class="nomina-label">Décimo tercer mes (proporcional)</span>
          <span class="nomina-valor positivo">${fmt(decimoMes)}</span>
        </div>
        <div class="nomina-row">
          <span class="nomina-label">Vacaciones (proporcional)</span>
          <span class="nomina-valor positivo">${fmt(vacaciones)}</span>
        </div>
        ${primaAntiguedad > 0 ? `<div class="nomina-row">
          <span class="nomina-label">Prima de antigüedad (${anos} año${anos !== 1?'s':''})</span>
          <span class="nomina-valor positivo">${fmt(primaAntiguedad)}</span>
        </div>` : ''}
        <div class="nomina-sep">Deducciones (trabajadora)</div>
        <div class="nomina-row desc">
          <span class="nomina-label">CSS trabajadora (9.75%)</span>
          <span class="nomina-valor negativo">-${fmt(cssTrabajadora)}</span>
        </div>
        <div class="nomina-row total">
          <span class="nomina-label total">Total a pagar a la nana</span>
          <span class="nomina-valor total">${fmt(totalNeto)}</span>
        </div>
        <div style="background:var(--cr);border-radius:10px;padding:12px 14px;margin-top:10px;border:1px solid var(--g4);">
          <div style="font-size:11px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;">Costo total para el empleador</div>
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--txt2);margin-bottom:4px;"><span>CSS empleador (12.25%)</span><span style="color:var(--b2);">+${fmt(cssEmpleador)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600;color:var(--txt);"><span>Costo total empleador</span><span>${fmt(costoEmpleador)}</span></div>
        </div>
        <button class="btn-pagar" onclick="abrirModalPago(${totalNeto.toFixed(2)})">💳 Registrar este pago</button>
        <button class="btn-recibo" onclick="generarRecibo(${totalNeto.toFixed(2)}, ${salario.toFixed(2)}, ${decimoMes.toFixed(2)}, ${vacaciones.toFixed(2)}, ${cssTrabajadora.toFixed(2)})">🖨️ Imprimir recibo</button>

window.toggleDia = async (key, el) => {
  if (!hogarId) { showToast('Sin hogar configurado'); return; }
  const estado = diasTrabajados[key];
  if (!estado) { diasTrabajados[key] = 'trabajo'; el.className = 'dia-cell trabajado' + (el.classList.contains('hoy') ? ' hoy' : ''); }
  else if (estado === 'trabajo') { diasTrabajados[key] = 'libre'; el.className = 'dia-cell libre' + (el.classList.contains('hoy') ? ' hoy' : ''); }
  else { delete diasTrabajados[key]; el.className = 'dia-cell' + (el.classList.contains('hoy') ? ' hoy' : ''); }

  const mesKey = `${HOY.getFullYear()}-${String(HOY.getMonth()+1).padStart(2,'0')}`;
  await setDoc(doc(db, 'hogares', hogarId, 'dias', mesKey), { dias: diasTrabajados }, { merge: true });
  renderDias(document.getElementById('tabContenido'), document.getElementById('tabLateral'));
};

window.marcarSemanaLaboral = async () => {
  const año = HOY.getFullYear(); const mes = HOY.getMonth();
  const diasEnMes = new Date(año, mes+1, 0).getDate();
  for (let d = 1; d <= diasEnMes; d++) {
    const fecha = new Date(año, mes, d);
    const diaSemana = fecha.getDay();
    const key = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (diaSemana >= 1 && diaSemana <= 6) diasTrabajados[key] = 'trabajo';
    else diasTrabajados[key] = 'libre';
  }
  const mesKey = `${año}-${String(mes+1).padStart(2,'0')}`;
  await setDoc(doc(db, 'hogares', hogarId, 'dias', mesKey), { dias: diasTrabajados });
  renderDias(document.getElementById('tabContenido'), document.getElementById('tabLateral'));
  showToast('✅ Semana laboral marcada');
};

window.limpiarMes = async () => {
  diasTrabajados = {};
  const mesKey = `${HOY.getFullYear()}-${String(HOY.getMonth()+1).padStart(2,'0')}`;
  await setDoc(doc(db, 'hogares', hogarId, 'dias', mesKey), { dias: {} });
  renderDias(document.getElementById('tabContenido'), document.getElementById('tabLateral'));
  showToast('🗑 Mes limpiado');
};

function renderPagos(c, l) {
  const totalPagado = pagosHistorial.reduce((s, p) => s + (p.monto || 0), 0);

  c.innerHTML = `
    <div class="panel">
      <div class="panel-hdr">
        <div>
          <div class="panel-title">Registro de pagos</div>
          <div class="panel-sub">${pagosHistorial.length} pagos registrados</div>
        </div>
        <button onclick="abrirModalPago()" style="background:var(--g);color:#fff;border:none;border-radius:99px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">+ Registrar pago</button>
      </div>
      ${!pagosHistorial.length ? `
        <div class="empty-state">
          <div class="empty-icon">💰</div>
          <div style="font-size:15px;font-weight:500;color:var(--txt);margin-bottom:4px;">Sin pagos registrados</div>
          <div style="font-size:13px;color:var(--txt2);">Registra el primer pago para llevar el historial</div>
        </div>` :
        pagosHistorial.map(p => {
          const fecha = p.fecha?.toDate ? p.fecha.toDate().toLocaleDateString('es-PA') : p.fecha || '';
          return `<div class="pago-item">
            <div class="pago-icon" style="background:var(--g3);">💰</div>
            <div class="pago-info">
              <div class="pago-desc">${p.concepto}</div>
              <div class="pago-fecha">${fecha}${p.nota ? ' · ' + p.nota : ''}</div>
            </div>
            <div style="text-align:right;">
              <div class="pago-monto">$${parseFloat(p.monto).toFixed(2)}</div>
              <div class="pago-estado" style="background:var(--g3);color:var(--g);">Pagado</div>
            </div>
          </div>`;
        }).join('')}
    </div>`;

  l.innerHTML = `
    <div class="panel">
      <div class="panel-hdr"><div class="panel-title">Resumen total</div></div>
      <div style="padding:16px 18px;display:flex;flex-direction:column;gap:10px;">
        <div style="background:var(--g2);border-radius:12px;padding:18px;text-align:center;">
          <div style="font-size:12px;color:rgba(255,255,255,.55);margin-bottom:6px;">Total pagado</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;color:#fff;">$${totalPagado.toFixed(2)}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;">${pagosHistorial.length} pagos registrados</div>
        </div>
        ${pagosHistorial.length > 0 ? `
          <div style="background:var(--cr);border-radius:10px;padding:12px;border:1px solid var(--g4);">
            <div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Por concepto</div>
            ${Object.entries(pagosHistorial.reduce((acc, p) => {
              acc[p.concepto] = (acc[p.concepto] || 0) + p.monto;
              return acc;
            }, {})).map(([concepto, total]) => `
              <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--txt2);margin-bottom:4px;">
                <span>${concepto}</span>
                <span style="font-weight:500;color:var(--g);">$${total.toFixed(2)}</span>
              </div>`).join('')}
          </div>` : ''}
        <button onclick="abrirModalPago()" class="btn-calc">+ Registrar nuevo pago</button>
      </div>
    </div>`;
}

// ── MODAL PAGO ──
window.abrirModalPago = (montoSugerido) => {
  document.getElementById('modalPago').classList.remove('oculto');
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('pagoFecha').value = hoy;
  if (montoSugerido) document.getElementById('pagoMonto').value = montoSugerido;
};

window.cerrarModalPago = () => document.getElementById('modalPago').classList.add('oculto');

window.guardarPago = async () => {
  const concepto = document.getElementById('pagoConcepto').value;
  const monto = parseFloat(document.getElementById('pagoMonto').value);
  const fecha = document.getElementById('pagoFecha').value;
  const nota = document.getElementById('pagoNota').value.trim();

  if (!monto || !fecha) { showToast('Completa monto y fecha'); return; }
  if (!hogarId) { showToast('Sin hogar configurado'); return; }

  try {
    const ref = await addDoc(collection(db, 'hogares', hogarId, 'pagos'), {
      concepto, monto, fecha, nota,
      nanaUid: nanaVinculada?.uid || null,
      nanaNombre: nanaVinculada?.nombre || '',
      registradoPor: usuarioActual.uid,
      timestamp: serverTimestamp()
    });

    pagosHistorial.unshift({ id: ref.id, concepto, monto, fecha, nota });
    cerrarModalPago();
    document.getElementById('pagoMonto').value = '';
    document.getElementById('pagoNota').value = '';
    renderPagos(document.getElementById('tabContenido'), document.getElementById('tabLateral'));
    showToast(`✅ Pago de $${monto.toFixed(2)} registrado`);
  } catch(e) {
    showToast('❌ Error al registrar');
    console.error(e);
  }
};
