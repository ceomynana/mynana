<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>My Nana — Centro de Conocimiento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#1A6B52;--g2:#0F4A38;--g3:#F0F7F4;--g4:#E1F0EB;
  --b:#D4A5A5;--b2:#BF9090;--b3:#F7EFEF;
  --cr:#F9F5F0;--txt:#1A2E25;--txt2:#4A6358;
  --r:14px;--r2:20px;--r3:99px;
  --shadow:0 2px 12px rgba(26,107,82,.08);
  --shadow-md:0 4px 24px rgba(26,107,82,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--txt);overflow-x:hidden;min-height:100dvh;padding-bottom:80px;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--g2);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .4s;}
#splash.out{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Cormorant Garamond',serif;font-size:32px;color:#fff;}
.splash-logo em{color:var(--b);font-style:normal;}
.splash-sub{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;}

/* ── HEADER ── */
.header{background:var(--g2);padding:env(safe-area-inset-top,48px) 20px 0;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 14px;}
.header-back{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.75);font-size:13px;padding:7px 14px;border-radius:var(--r3);cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.header-title{font-family:'Cormorant Garamond',serif;font-size:17px;color:#fff;font-weight:500;}
.header-fav-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.75);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}

/* ── SEARCH ── */
.search-wrap{padding:0 0 14px;}
.search-row{display:flex;gap:8px;align-items:center;}
.search-box{flex:1;position:relative;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:rgba(255,255,255,.4);pointer-events:none;}
.search-input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--r3);padding:10px 16px 10px 38px;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;outline:none;transition:all .2s;}
.search-input::placeholder{color:rgba(255,255,255,.35);}
.search-input:focus{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.filter-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--r3);padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,.75);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.filter-btn.active{background:var(--b);border-color:var(--b);color:#fff;}

/* ── CATEGORY PILLS ── */
.cats-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 0 14px;-ms-overflow-style:none;scrollbar-width:none;}
.cats-scroll::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:7px 14px;border-radius:var(--r3);border:1.5px solid rgba(255,255,255,.2);background:transparent;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.cat-pill.activa{background:var(--b);border-color:var(--b);color:#fff;}
.cat-pill:hover{background:rgba(255,255,255,.1);}

/* ── FILTER PANEL ── */
.filter-panel{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);}
.filter-panel.visible{display:flex;align-items:flex-end;}
.filter-sheet{background:#fff;border-radius:var(--r2) var(--r2) 0 0;width:100%;padding:20px 20px 40px;max-height:80vh;overflow-y:auto;}
.filter-handle{width:36px;height:4px;background:var(--g4);border-radius:var(--r3);margin:0 auto 20px;}
.filter-section-title{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.filter-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.filter-chip{padding:7px 14px;border-radius:var(--r3);border:1.5px solid var(--g4);background:#fff;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.filter-chip.sel{background:var(--g);border-color:var(--g);color:#fff;}
.filter-actions{display:flex;gap:10px;margin-top:4px;}
.filter-clear{flex:1;background:#fff;border:1.5px solid var(--g4);border-radius:var(--r3);padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--txt2);cursor:pointer;}
.filter-apply{flex:1;background:var(--g);border:none;border-radius:var(--r3);padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#fff;cursor:pointer;}

/* ── MAIN CONTENT ── */
.content{padding:20px;}

/* ── PROGRESS CARD ── */
.prog-card{background:var(--g2);border-radius:var(--r2);padding:18px;margin-bottom:20px;position:relative;overflow:hidden;}
.prog-card::before{content:'';position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04);}
.prog-card::after{content:'';position:absolute;bottom:-30px;right:20px;width:80px;height:80px;border-radius:50%;background:rgba(212,165,165,.08);}
.prog-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.prog-circle{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid var(--b);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.prog-n{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#fff;line-height:1;}
.prog-l{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px;letter-spacing:.04em;}
.prog-info{flex:1;}
.prog-titulo{font-size:14px;font-weight:500;color:#fff;margin-bottom:3px;}
.prog-sub{font-size:12px;color:rgba(255,255,255,.5);}
.prog-badges{display:flex;gap:6px;flex-wrap:wrap;}
.prog-badge{background:rgba(255,255,255,.1);border-radius:var(--r3);padding:4px 10px;font-size:11px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:4px;}
.prog-barra-wrap{margin-top:12px;}
.prog-barra-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.45);margin-bottom:5px;}
.prog-barra{height:5px;background:rgba(255,255,255,.12);border-radius:var(--r3);overflow:hidden;}
.prog-fill{height:100%;background:var(--b);border-radius:var(--r3);transition:width .6s;}

/* ── SECTION ── */
.sec-label{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--g4);}
.sec-count{background:var(--g4);color:var(--g);font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--r3);}

/* ── GUIA FEATURED ── */
.guia-featured{background:var(--g2);border-radius:var(--r2);overflow:hidden;margin-bottom:20px;cursor:pointer;transition:transform .15s;position:relative;}
.guia-featured:active{transform:scale(.98);}
.guia-featured-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:72px;position:relative;}
.guia-featured-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(15,74,56,.8));}
.guia-featured-badge{position:absolute;top:12px;left:12px;background:var(--b);color:#fff;font-size:10px;font-weight:600;padding:4px 10px;border-radius:var(--r3);letter-spacing:.04em;text-transform:uppercase;}
.guia-featured-fav{position:absolute;top:10px;right:12px;background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.guia-featured-fav.saved{color:#f9a825;}
.guia-featured-info{padding:14px 16px 16px;}
.guia-featured-cat{font-size:10px;font-weight:600;color:var(--b);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.guia-featured-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;margin-bottom:6px;line-height:1.25;}
.guia-featured-meta{display:flex;align-items:center;gap:12px;font-size:11px;color:rgba(255,255,255,.5);}

/* ── GUIAS GRID ── */
.guias-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.guia-card{background:#fff;border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--g4);transition:all .2s;display:flex;flex-direction:column;}
.guia-card:active{transform:scale(.97);}
.guia-thumb{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;background:var(--g3);}
.guia-nivel-badge{position:absolute;bottom:6px;left:6px;border-radius:var(--r3);padding:2px 8px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.nivel-basico{background:#E8F5E9;color:#2E7D32;}
.nivel-intermedio{background:#FFF3E0;color:#E65100;}
.nivel-avanzado{background:#FCE4EC;color:#AD1457;}
.guia-fav{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.9);border:none;width:26px;height:26px;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#ccc;}
.guia-fav.saved{color:#f9a825;}
.guia-info{padding:10px 11px 12px;flex:1;display:flex;flex-direction:column;}
.guia-cat-tag{font-size:10px;background:var(--g3);color:var(--g);padding:2px 7px;border-radius:var(--r3);font-weight:500;display:inline-block;margin-bottom:5px;align-self:flex-start;}
.guia-title{font-size:13px;font-weight:500;color:var(--txt);line-height:1.4;margin-bottom:auto;padding-bottom:7px;}
.guia-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:#bbb;margin-top:auto;}
.guia-completada-mark{font-size:13px;}

/* ── GUIAS LIST (favoritos) ── */
.guia-list-item{background:#fff;border-radius:var(--r);border:1px solid var(--g4);display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;margin-bottom:8px;transition:all .2s;}
.guia-list-item:active{transform:scale(.98);}
.guia-list-thumb{width:56px;height:56px;border-radius:10px;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.guia-list-info{flex:1;min-width:0;}
.guia-list-title{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.guia-list-meta{font-size:11px;color:#bbb;display:flex;gap:8px;align-items:center;}
.guia-list-fav{background:none;border:none;color:#f9a825;font-size:16px;cursor:pointer;flex-shrink:0;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;}
.empty-emoji{font-size:48px;margin-bottom:12px;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--txt);margin-bottom:6px;}
.empty-sub{font-size:14px;color:var(--txt2);line-height:1.6;}

/* ── MODAL DETALLE ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.visible{opacity:1;pointer-events:all;}
.modal-box{background:#fff;border-radius:var(--r2) var(--r2) 0 0;width:100%;max-width:600px;max-height:92dvh;overflow-y:auto;transform:translateY(40px);transition:transform .25s;-webkit-overflow-scrolling:touch;}
.modal-overlay.visible .modal-box{transform:translateY(0);}
@media(min-width:640px){.modal-overlay{justify-content:center;}.modal-box{border-radius:var(--r2);max-height:85vh;}}
.modal-handle{width:36px;height:4px;background:var(--g4);border-radius:var(--r3);margin:14px auto 0;}
.modal-hero{height:200px;display:flex;align-items:center;justify-content:center;font-size:88px;position:relative;}
.modal-hero-actions{position:absolute;top:12px;right:12px;display:flex;gap:8px;}
.modal-close-btn{background:rgba(255,255,255,.9);border:none;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-fav-btn{background:rgba(255,255,255,.9);border:none;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#ccc;}
.modal-fav-btn.saved{color:#f9a825;}
.modal-body{padding:18px 20px 24px;}
.modal-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.modal-badge-cat{background:var(--g3);color:var(--g);font-size:11px;font-weight:600;padding:4px 11px;border-radius:var(--r3);}
.modal-badge-nivel{font-size:11px;font-weight:600;padding:4px 11px;border-radius:var(--r3);}
.modal-badge-tiempo{background:var(--b3);color:var(--b2);font-size:11px;font-weight:500;padding:4px 11px;border-radius:var(--r3);}
.modal-titulo{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--txt);margin-bottom:8px;line-height:1.25;}
.modal-resumen{font-size:14px;color:var(--txt2);line-height:1.75;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--g4);}
.modal-section-lbl{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.modal-section-lbl::after{content:'';flex:1;height:1px;background:var(--g4);}
.pasos-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.paso{display:flex;gap:12px;align-items:flex-start;}
.paso-num{width:28px;height:28px;border-radius:50%;background:var(--g);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.paso-texto{font-size:14px;color:var(--txt2);line-height:1.65;padding-top:4px;}
.consejo-box{background:var(--g3);border-left:3px solid var(--g);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;margin-bottom:14px;}
.consejo-label{font-size:11px;font-weight:600;color:var(--g);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.consejo-txt{font-size:13px;color:var(--txt2);line-height:1.65;}
.error-box{background:var(--b3);border-left:3px solid var(--b2);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;margin-bottom:14px;}
.error-label{font-size:11px;font-weight:600;color:var(--b2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.info-box{background:#FFF8E1;border-left:3px solid #F9A825;border-radius:0 var(--r) var(--r) 0;padding:14px 16px;margin-bottom:20px;}
.info-label{font-size:11px;font-weight:600;color:#E65100;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.modal-footer{border-top:1px solid var(--g4);padding-top:16px;}
.completar-btn{width:100%;background:var(--g);border:none;border-radius:var(--r3);padding:15px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;cursor:pointer;transition:all .2s;margin-bottom:10px;}
.completar-btn.done{background:var(--g3);color:var(--g);}
.cerrar-btn{width:100%;background:#fff;border:1.5px solid var(--g4);border-radius:var(--r3);padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--txt2);cursor:pointer;}
.modal-date{font-size:11px;color:#bbb;text-align:center;margin-top:10px;}

/* ── TOAST ── */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--g);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--r3);z-index:400;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 16px rgba(26,107,82,.3);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--g4);padding:8px 0 env(safe-area-inset-bottom,16px);display:flex;z-index:50;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
.nav-icon{font-size:20px;}
.nav-label{font-size:10px;color:#bbb;font-weight:500;}
.nav-item.activo .nav-label{color:var(--g);}

/* ── TABS ── */
.tabs{display:flex;background:var(--g3);border-radius:var(--r3);padding:3px;margin-bottom:20px;gap:2px;}
.tab{flex:1;text-align:center;padding:8px 4px;border-radius:var(--r3);font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.tab.activo{background:#fff;color:var(--g);box-shadow:0 1px 4px rgba(26,107,82,.1);}

/* ── VIEWS ── */
.view{display:none;}
.view.activa{display:block;}

/* ── CERT CARD ── */
.cert-card{background:var(--g2);border-radius:var(--r2);padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
.cert-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04);}
.cert-emoji{font-size:32px;margin-bottom:8px;}
.cert-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:#fff;margin-bottom:4px;}
.cert-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:14px;}
.cert-barra{height:5px;background:rgba(255,255,255,.12);border-radius:var(--r3);overflow:hidden;}
.cert-fill{height:100%;background:var(--b);border-radius:var(--r3);}
.cert-meta{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.4);margin-top:6px;}

.insig-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.insig-card{background:#fff;border-radius:var(--r);border:1px solid var(--g4);padding:12px 8px;text-align:center;}
.insig-emoji{font-size:28px;margin-bottom:6px;}
.insig-name{font-size:11px;font-weight:500;color:var(--txt);line-height:1.3;margin-bottom:3px;}
.insig-estado{font-size:10px;color:#bbb;}
.insig-card.earned{border-color:var(--g);background:var(--g3);}
.insig-card.earned .insig-estado{color:var(--g);}

/* No results */
.no-results{text-align:center;padding:40px 20px;}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">My <em>Nana</em></div>
  <div class="splash-sub">Centro de Conocimiento</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <a href="/app.html" class="header-back">← Inicio</a>
    <span class="header-title">📚 Conocimiento</span>
    <button class="header-fav-btn" onclick="switchTab('favoritos')" title="Ver favoritos">♡</button>
  </div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Buscar guías..." autocomplete="off" oninput="onSearch()">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>
      <button class="filter-btn" id="filterBtn" onclick="openFilter()">⚙ Filtrar</button>
    </div>
  </div>
  <div class="cats-scroll" id="catsScroll"></div>
</div>

<!-- TABS -->
<div class="content" id="mainContent">
  <div class="tabs">
    <button class="tab activo" id="tab-inicio" onclick="switchTab('inicio')">Inicio</button>
    <button class="tab" id="tab-favoritos" onclick="switchTab('favoritos')">♡ Guardadas</button>
    <button class="tab" id="tab-progreso" onclick="switchTab('progreso')">Mi Progreso</button>
  </div>

  <!-- VIEW: INICIO -->
  <div class="view activa" id="view-inicio">
    <!-- progreso card -->
    <div class="prog-card">
      <div class="prog-top">
        <div class="prog-circle">
          <div class="prog-n" id="progN">0</div>
          <div class="prog-l">guías</div>

   consejo:'Para eliminar olores del microondas, deja media limón adentro durante 2 horas con la puerta cerrada.',
   errores:'Nunca sumerjas la base de la licuadora, cafetera ni tostadora en agua.',
   info:'La cafetera debe descalcificarse con vinagre cada mes si se usa a diario. El sarro reduce su vida útil.'},
  {id:20,cat:'limpieza',emoji:'🪑',titulo:'Limpieza de alfombras y tapetes',nivel:'Intermedio',min:3,
   resumen:'Las alfombras son los elementos que más polvo y ácaros acumulan en el hogar. Su limpieza regular es clave para la salud respiratoria.',
   pasos:['Aspira en dos direcciones — primero paralelo y luego perpendicular a las fibras.','Para manchas frescas: absorbe con paño limpio sin frotar. Aplica agua tibia con jabón neutro.','Para olores: espolvorea bicarbonato, deja 30 minutos y aspira.','Para limpieza profunda mensual: lava con champú para alfombras y cepillo suave.','Seca completamente al sol o con ventilador antes de colocar de vuelta.'],
   consejo:'Coloca un tapete limpiapies en cada entrada. Evita que el 70% del polvo exterior entre a la casa.',
   errores:'No saturar de agua una alfombra — el exceso no seca bien y genera moho desde adentro.',
   info:'Las alfombras muy grandes o antiguas requieren limpieza profesional con aspirado industrial al menos una vez al año.'},
  {id:21,cat:'limpieza',emoji:'🗂️',titulo:'Limpieza de la zona de estudio u oficina',nivel:'Básico',min:1,
   resumen:'Un espacio de trabajo limpio y organizado mejora la concentración, reduce el estrés y protege los equipos electrónicos.',
   pasos:['Apaga todos los equipos antes de limpiar.','Limpia el monitor con paño de microfibra seco — nunca líquido directo.','Limpia el teclado volteándolo y agitando, luego pasa entre teclas con brocha suave.','Desinfecta el mouse y superficies con paño húmedo con alcohol isopropílico.','Organiza cables con amarras o cajas organizadoras para evitar polvo acumulado.'],
   consejo:'Un humidificador cerca del área de trabajo reduce la estática que atrae polvo a las pantallas.',
   errores:'No usar sprays directamente sobre pantallas ni teclados. No limpiar con toallas húmedas para bebé — dejan residuos.',
   info:'Los ventiladores y disipadores de las computadoras deben limpiarse con aire comprimido cada 3 meses.'},
  {id:22,cat:'limpieza',emoji:'🛁',titulo:'Eliminación de sarro y moho en baños',nivel:'Intermedio',min:3,
   resumen:'El sarro y el moho son los enemigos principales del baño. Con los productos correctos y la técnica adecuada se eliminan sin dañar las superficies.',
   pasos:['Para sarro en grifo: envuelve con papel húmedo empapado en vinagre. Deja 1 hora.','Para moho en juntas: aplica cloro con cepillo de dientes viejo. Deja 15 minutos.','Para manchas de sarro en ducha: mezcla bicarbonato y vinagre hasta formar pasta. Aplica y frota.','Enjuaga con agua caliente para activar la remoción.','Seca las superficies después de la ducha para prevenir nueva formación.'],
   consejo:'Aplica aceite de árbol de té (tea tree oil) en las juntas después de limpiar. Es antifúngico natural.',
   errores:'No mezclar cloro con ácido — genera gas tóxico. No usar cloro sobre mármol ni superficies naturales.',
   info:'Si el moho cubre más de 1 m², puede indicar problema estructural de humedad. Consultar a un especialista.'},

  // ── LAVANDERÍA (10) ──────────────────────────
  {id:23,cat:'lavanderia',emoji:'🧺',titulo:'Separar ropa correctamente antes de lavar',nivel:'Básico',min:1,
   resumen:'Separar la ropa es el primer paso para cuidarla. Un error al mezclar colores o tejidos puede arruinar prendas completas.',
   pasos:['Separa por color: blancos, claros y oscuros siempre por separado.','Separa por tipo de tejido: delicados (seda, encaje) del resto.','Separa por suciedad: ropa muy sucia o manchada en un grupo aparte.','Revisa los bolsillos antes de meter en la lavadora.','Lee la etiqueta de lavado antes de incluir una prenda nueva.'],
   consejo:'Compra 3 cestas de ropa sucia distintas: una para blancos, una para colores, una para delicados.',
   errores:'Nunca lavar toallas con ropa de colores delgados — las pelusas se adhieren.',
   info:'La ropa de trabajo (uniformes de cocina, overoles) debe lavarse siempre separada de la ropa personal.'},
  {id:24,cat:'lavanderia',emoji:'📋',titulo:'Leer etiquetas de ropa correctamente',nivel:'Básico',min:2,
   resumen:'Las etiquetas de la ropa contienen instrucciones de lavado en símbolos universales. Entenderlas es fundamental para no arruinar prendas.',
   pasos:['Símbolo de bañera: indica lavado. Número adentro = temperatura máxima.','Mano en bañera: solo lavar a mano.','Triángulo: blanqueador. Con X = nunca usar cloro.','Cuadrado: secado. Con puntos = temperatura del secador.','Plancha: temperatura según puntos (1=baja, 2=media, 3=alta).'],
   consejo:'Fotografía las etiquetas de tus prendas más delicadas para consultarlas rápidamente sin quitarlas del closet.',
   errores:'No ignorar las etiquetas aunque "parezca" ropa resistente. Una prenda de lana a 60° encoge permanentemente.',
   info:'La X sobre cualquier símbolo significa prohibido. Es el símbolo más importante de recordar.'},
  {id:25,cat:'lavanderia',emoji:'🌡️',titulo:'Temperatura correcta para cada tipo de ropa',nivel:'Básico',min:1,
   resumen:'La temperatura del agua afecta tanto la limpieza como la durabilidad de la ropa. Usar la temperatura correcta alarga la vida de las prendas.',
   pasos:['30°C — Ropa delicada, colores oscuros, sintéticos y lana (ciclo delicado).','40°C — Ropa de uso diario, algodón, mezclas, toallas de colores.','60°C — Ropa de cama, toallas blancas, ropa de bebé, textiles sucios.','90°C — Solo para blancos de algodón muy sucios o artículos médicos.','Agua fría — Para colores muy intensos que pueden soltar tinte.'],
   consejo:'El 90% de la ropa cotidiana se limpia perfectamente a 30-40°C. Usar más temperatura solo gasta más energía.',
   errores:'No lavar ropa de color oscuro a más de 40°C — se decolora progresivamente.',
   info:'Agua fría no equivale a mala limpieza. Los detergentes modernos son efectivos desde los 20°C.'},
  {id:26,cat:'lavanderia',emoji:'🧼',titulo:'Cantidad correcta de detergente',nivel:'Básico',min:1,
   resumen:'Usar más detergente del necesario es uno de los errores más comunes. No limpia mejor y daña la lavadora y la ropa.',
   pasos:['Lee las instrucciones del detergente para saber la dosis por carga.','Para carga estándar: usa la medida indicada, nunca más.','Para agua dura o ropa muy sucia: aumenta el 20%, no dobles la dosis.','Para ropa delicada: usa la mitad de la dosis normal.','Los detergentes concentrados requieren mucho menos cantidad que los tradicionales.'],
   consejo:'El exceso de detergente se queda en la ropa como residuo y puede causar irritación de piel.',
   errores:'No añadir detergente directamente sobre la ropa — puede manchar. Siempre al dispensador.',
   info:'Si la lavadora forma mucha espuma, has usado demasiado detergente. Corre ciclo de enjuague extra.'},
  {id:27,cat:'lavanderia',emoji:'🩺',titulo:'Cómo quitar manchas antes de lavar',nivel:'Intermedio',min:2,
   resumen:'Actuar rápido es la clave para eliminar manchas. Cuanto más tiempo pasa, más difícil es removerlas.',
   pasos:['Absorbe el líquido inmediatamente con paño limpio — nunca frotar.','Identifica el tipo de mancha antes de aplicar cualquier producto.','Grasa: aplica talco o sal para absorber, luego desengrasante.','Sangre fresca: agua fría (nunca caliente) y jabón neutro.','Vino, café, jugo: agua con sal inmediatamente, luego lavar normalmente.'],
   consejo:'El quitamanchas más efectivo para ropa blanca es el sol directo. Moja la mancha con jugo de limón y déjala al sol.',
   errores:'El agua caliente fija las manchas de proteína (sangre, huevo, leche). Siempre agua fría para estas.',
   info:'Para manchas de tinta de bolígrafo: aplica alcohol isopropílico con algodón antes de lavar.'},
  {id:28,cat:'lavanderia',emoji:'✂️',titulo:'Cuidado de ropa delicada a mano',nivel:'Intermedio',min:2,
   resumen:'La seda, el encaje, la lana fina y ciertos sintéticos delicados requieren lavado a mano para conservar su forma y textura.',
   pasos:['Prepara agua fría o tibia (máximo 30°C) con detergente para delicados.','Sumerge la prenda completamente y mueve suavemente — sin frotar ni torcer.','Enjuaga con agua limpia del mismo temperatura para no producir choque térmico.','Exprime suavemente envolviendo en una toalla seca — nunca escurrir.','Tiende en horizontal sobre una toalla o rejilla — nunca en gancho (se deforma).'],
   consejo:'Añade unas gotas de acondicionador de cabello al agua de enjuague para suavizar la lana.',
   errores:'No frotar, retorcer ni exprimir con fuerza ropa delicada. No dejar empapada más de 15 minutos.',
   info:'Lana mojada pesa mucho y se deforma fácilmente. Nunca cuelgues sweaters de lana en ganchos.'},
  {id:29,cat:'lavanderia',emoji:'☀️',titulo:'Secado correcto de ropa',nivel:'Básico',min:1,
   resumen:'El secado incorrecto es responsable de la deformación, encogimiento y decoloración de muchas prendas.',
   pasos:['Lee la etiqueta antes de usar secadora o tender al sol.','Ropa delicada y de color: secar a la sombra — el sol directo decolora.','Blancos de algodón: el sol directo blanquea y desinfecta.','En secadora: no sobre-secar — saca la ropa ligeramente húmeda.','Cuelga la ropa bien extendida para que no quede arrugada.'],
   consejo:'Sacude cada prenda antes de colgar para estirar las fibras y reducir las arrugas.',
   errores:'No tender ropa amontonada en el tendedero — no seca parejo y huele mal.',
   info:'La ropa de cama se seca mejor extendida en dos tendederos en paralelo para maximizar la circulación de aire.'},
  {id:30,cat:'lavanderia',emoji:'🔧',titulo:'Planchar correctamente sin dañar la ropa',nivel:'Intermedio',min:2,
   resumen:'Planchar con la temperatura incorrecta puede arruinar una prenda permanentemente. Con la técnica adecuada se plancha eficientemente.',
   pasos:['Organiza la ropa por temperatura: primero la que requiere menos calor, luego más.','Consulta la etiqueta: 1 punto=baja, 2=media, 3=alta temperatura.','Plancha la ropa ligeramente húmeda para mejores resultados.','Mueve la plancha siempre en el sentido de las fibras, no en circular.','Para telas delicadas, usa un paño de algodón húmedo entre la plancha y la tela.'],
   consejo:'Para prendas sin arrugas rápido: cuélgalas en el baño mientras te duchas. El vapor las alisa.',
   errores:'No planchar terciopelo, cuero, telas plásticas ni ropa húmeda oscura directamente sin paño.',
   info:'Limpia la suela de la plancha mensualmente con sal gruesa o limpiador especial para planchas.'},
  {id:31,cat:'lavanderia',emoji:'🧸',titulo:'Lavado de peluches y juguetes de tela',nivel:'Básico',min:2,
   resumen:'Los peluches acumulan ácaros y bacterias. Lavarlos correctamente elimina alérgenos y los mantiene seguros para los niños.',
   pasos:['Revisa la etiqueta — muchos peluches son lavables a máquina en bolsa de tela.','Usa ciclo delicado, agua fría y detergente suave.','Para peluches no lavables: mételos en una bolsa hermética y congélalos 48 horas para matar ácaros.','Sécalos a temperatura baja en secadora o al aire libre a la sombra.','Verifica que el relleno esté distribuido parejo antes de devolverlos al niño.'],
   consejo:'Agrega una media vuelta de secado con una pelota de tenis en la secadora para que el peluche quede esponjoso.',
   errores:'No secar peluches grandes directamente al sol — el color se decolora y el relleno se apelmaza.',
   info:'Los peluches de niños menores de 3 años deben lavarse cada semana para evitar acumulación de gérmenes.'},
  {id:32,cat:'lavanderia',emoji:'👟',titulo:'Lavado de zapatos y calzado',nivel:'Intermedio',min:2,
   resumen:'Los zapatos sucios son fuente de malos olores y bacterias. Lavarlos correctamente los limpia sin dañarlos.',
   pasos:['Quita los cordones y las plantillas — lávalos por separado a mano.','Retira el barro grueso con cepillo seco antes de mojar.','Tenis de tela: lavadora en bolsa, ciclo delicado, agua fría.','Cuero: solo limpieza en seco con crema específica — nunca sumergir en agua.','Sécalos rellenos con papel periódico para que mantengan la forma.'],
   consejo:'Espolvorea bicarbonato dentro de los zapatos y déjalo toda la noche para eliminar el olor.',
   errores:'No secar zapatos de tela en secadora o al sol directo — se deforman y endurecen.',
   info:'Los zapatos de cuero deben hidratarse con crema cada 3 meses para evitar que se agrieten.'},

  // ── COCINA (12) ──────────────────────────────
  {id:33,cat:'cocina',emoji:'🍳',titulo:'Mise en place: preparar antes de cocinar',nivel:'Básico',min:2,
   resumen:'Mise en place (tenerlo todo listo antes de cocinar) es el hábito que separa a las cocineras organizadas de las estresadas.',
   pasos:['Lee la receta completa antes de empezar — de inicio a fin.','Saca todos los ingredientes y utensilios necesarios.','Lava, pela y corta todos los ingredientes antes de encender el fuego.','Organiza los ingredientes en el orden que los usarás.','Prepara los condimentos y salsas que usarás durante la cocción.'],
   consejo:'Usa pequeños tazones para tener cada ingrediente listo. La cocina se hace más rápida y ordenada.',
   errores:'No empezar a cocinar con la nevera abierta buscando ingredientes — el tiempo y la concentración se pierden.',
   info:'Los chefs profesionales dedican hasta el 60% del tiempo a la preparación y solo el 40% a la cocción.'},
  {id:34,cat:'cocina',emoji:'🔪',titulo:'Técnicas básicas de corte seguro',nivel:'Básico',min:2,
   resumen:'Un buen corte hace que los alimentos se cocinen parejo y la cocina sea más segura. La técnica correcta previene accidentes.',
   pasos:['Usa siempre una tabla de cortar estable — coloca un paño húmedo debajo para que no resbale.','Sujeta los alimentos con la mano en garra: dedos doblados, nudillos hacia adelante.','El cuchillo guía contra los nudillos — nunca expone los dedos.','Corta siempre lejos del cuerpo, con movimiento hacia adelante.','Mantén el cuchillo afilado — los cuchillos opacos requieren más fuerza y son más peligrosos.'],
   consejo:'Para cortar cebolla sin llorar: enfríala 30 minutos en el congelador antes de cortar.',
   errores:'Nunca agarres un cuchillo que cae — déjalo caer. Nunca pongas cuchillos en el fregadero con agua.',
   info:'Un cuchillo chef bien afilado es el utensilio más importante de cualquier cocina. Afílalo cada 2 semanas.'},
  {id:35,cat:'cocina',emoji:'🌡️',titulo:'Temperatura correcta para cocinar carnes',nivel:'Intermedio',min:2,
   resumen:'Cocinar carnes a la temperatura correcta garantiza seguridad alimentaria. Las carnes poco cocidas pueden contener bacterias peligrosas.',
   pasos:['Pollo y aves: temperatura interna mínima de 74°C — el jugo debe salir claro.','Res (bien cocida): 71°C. Término medio: 63°C con 3 min de reposo.','Cerdo: mínimo 63°C temperatura interna.','Pescado: se deshace en capas, color opaco uniforme.','Usa termómetro de cocina para medir — no confíes solo en el color.'],
   consejo:'Deja reposar las carnes 5 minutos después de cocinar. La temperatura sigue subiendo y los jugos se redistribuyen.',
   errores:'No cortar la carne inmediatamente al sacarla del fuego — pierdes todos los jugos.',
   info:'El pollo rosado o con jugos rosados NUNCA es seguro para comer, independientemente del tiempo de cocción.'},
  {id:36,cat:'cocina',emoji:'🫙',titulo:'Conservación correcta de alimentos',nivel:'Básico',min:2,
   resumen:'Almacenar los alimentos correctamente evita el desperdicio, las intoxicaciones y los malos olores en la nevera.',
   pasos:['Zona más fría de la nevera (parte trasera inferior): carnes y pescados crudos.','Zona central: sobras, embutidos, lácteos, huevos.','Zona más cálida (puerta): condimentos, jugos, mantequilla.','Frutas y verduras: en el cajón del fondo — separadas entre sí.','Nunca guardes comida caliente directamente en la nevera.'],
   consejo:'La regla de los 2 días: las sobras cocinadas duran máximo 2 días refrigeradas. Después congela o desecha.',
   errores:'No guardar tomate, plátano, aguacate ni papa en la nevera — se dañan antes.',
   info:'Los alimentos cocinados deben bajar de 60°C a menos de 20°C en menos de 2 horas para ser seguros.'},
  {id:37,cat:'cocina',emoji:'🍚',titulo:'Cocinar arroz perfecto siempre',nivel:'Básico',min:2,
   resumen:'El arroz es la base de la comida panameña. Con la proporción y técnica correctas sale suelto y en su punto.',
   pasos:['Lava el arroz hasta que el agua salga clara — elimina el exceso de almidón.','Proporción: 1 taza de arroz por 1.5-2 tazas de agua (según la variedad).','Agrega sal, aceite y condimentos al agua fría antes de encender.','Hierve a fuego alto, luego baja al mínimo y tapa herméticamente.','No abras la tapa mientras cocina. Apaga al terminar el agua y deja reposar 5 minutos.'],
   consejo:'Para arroz más suelto, fríe el arroz en aceite caliente con ajo antes de agregar el agua.',
   errores:'No revolver el arroz mientras cocina — suelta almidón y queda pegajoso.',
   info:'El arroz blanco cocinado dura 3-4 días en la nevera bien tapado. Congela en porciones para tener siempre listo.'},
  {id:38,cat:'cocina',emoji:'🫕',titulo:'Cómo hacer un buen guiso/guisado',nivel:'Intermedio',min:3,
   resumen:'El guiso es la preparación más versátil de la cocina latina. Con la técnica correcta se hace en 30 minutos con cualquier proteína.',
   pasos:['Sofríe primero la cebolla, el ajo y el tomate en aceite caliente — esta base (sofrito) es fundamental.','Agrega la proteína y séllala sin moverla durante 2 minutos por lado.','Añade el agua o caldo suficiente para cubrir a la mitad.','Condimenta: sal, pimienta, comino, culantro al gusto.','Tapa y cocina a fuego medio-bajo hasta que la proteína esté tierna.'],
   consejo:'El culantro fresco picado agregado al final, fuera del fuego, transforma cualquier guiso panameño.',
   errores:'No agregar el agua fría a la proteína caliente — endurece la carne. Usa agua caliente o caldo.',
   info:'Para guisos más ricos, sustituye la mitad del agua por el líquido de una lata de tomates o caldo de pollo.'},
  {id:39,cat:'cocina',emoji:'🥗',titulo:'Higiene e inocuidad alimentaria',nivel:'Básico',min:2,
   resumen:'Preparar alimentos con correctas prácticas de higiene previene intoxicaciones que pueden ser graves, especialmente en niños y adultos mayores.',
   pasos:['Lávate las manos con agua y jabón mínimo 20 segundos antes de tocar alimentos.','Usa tablas de cortar distintas para carnes crudas y vegetales.','Nunca pongas alimentos cocinados en el mismo plato que tuvo carne cruda.','Lava frutas y verduras bajo agua corriente antes de cortar o consumir.','Si tienes dudas sobre si un alimento está en buen estado, deséchalo.'],
   consejo:'El limón y el vinagre son buenos desinfectantes para frutas y verduras — deja remojando 10 minutos.',
   errores:'No descongelar carnes a temperatura ambiente — usa la nevera o agua fría corriente.',
   info:'Las intoxicaciones alimentarias más comunes son por Salmonella (pollo crudo) y E. coli (carne molida mal cocida).'},
  {id:40,cat:'cocina',emoji:'🍵',titulo:'Preparación de infusiones y bebidas calientes',nivel:'Básico',min:1,
   resumen:'Las infusiones de hierbas tienen propiedades medicinales que se han usado por generaciones en el hogar latinoamericano.',
   pasos:['Hierve el agua, luego apaga y espera 1 minuto — el agua hirviendo destruye propiedades de las hierbas.','Usa 1 cucharadita de hierba seca o 1 ramita fresca por taza.','Tapa la taza o tetera durante la infusión para no perder los aceites esenciales.','Tiempo de infusión: 5-10 minutos según la hierba.','No endulces con azúcar — usa miel natural para no alterar las propiedades.'],
   consejo:'Manzanilla para el sueño y la digestión. Jengibre con limón para gripe y defensas. Toronjil para el estrés.',
   errores:'No hervir las hierbas directamente — pierden sus principios activos. Solo infusionar.',
   info:'El agua de panela con jengibre y limón es el remedio casero panameño más efectivo para el catarro.'},
  {id:41,cat:'cocina',emoji:'🧊',titulo:'Uso correcto del congelador',nivel:'Básico',min:2,
   resumen:'El congelador bien usado reduce el desperdicio de comida a la mitad y siempre tener opciones listas para cocinar.',
   pasos:['Congela en porciones del tamaño que vas a usar — no congeles bloques grandes.','Etiqueta todo con nombre y fecha. La memoria falla.','Duración: carnes crudas 3-6 meses, cocinadas 2-3 meses, pan 2 meses.','Descongela siempre en la nevera, nunca a temperatura ambiente.','No vuelvas a congelar algo que ya fue descongelado.'],
   consejo:'Aplana las bolsas de congelador antes de guardar — ocupan menos espacio y se descongelan más rápido.',
   errores:'No congelar ensaladas, papas cocidas, huevos con cáscara ni alimentos con crema.',
   info:'El congelador funciona mejor cuando está al 70-80% de su capacidad. Demasiado lleno o vacío reduce la eficiencia.'},
  {id:42,cat:'cocina',emoji:'🧄',titulo:'Cómo aprovechar sobras creativamente',nivel:'Básico',min:1,
   resumen:'Las sobras bien aprovechadas reducen el gasto en comida hasta en un 30%. Con creatividad se convierten en platos completamente distintos.',
   pasos:['Arroz sobrante: tortillas de arroz, arroz frito, croquetas.','Pollo sobrante: caldo, sándwiches, quesadillas, ensalada de pollo.','Vegetales sobrantes: sopas, frittatas, rellenos.','Pan duro: crotones, migas, bread pudding.','Planifica cocinar el doble en cada preparación para tener base para el día siguiente.'],
   consejo:'El "cocinar una vez, comer dos veces" es el hábito que más tiempo y dinero ahorra en la cocina.',
   errores:'No mezcles sobras sin verificar que siguen en buen estado — huele, revisa textura y color.',
   info:'En Panamá, el arroz sobrante frito con huevo y vegetales (arroz chino) es uno de los platos más populares.'},
  {id:43,cat:'cocina',emoji:'🧽',titulo:'Orden y limpieza mientras se cocina',nivel:'Básico',min:1,
   resumen:'Limpiar mientras se cocina hace que la cocina no se convierta en un caos y reduce el tiempo de limpieza posterior a la mitad.',
   pasos:['Lava los utensilios que ya no necesitas mientras algo hierve o se hornea.','Limpia derrames inmediatamente — en frío son mucho más fáciles de remover.','Ten un paño húmedo siempre a mano sobre la encimera.','Coloca la basura orgánica en un tazón o bolsa en la encimera mientras cocinas.','Al terminar, deja la cocina limpia antes de sentarte a comer.'],
   consejo:'La regla de oro: "si lo sacaste, vuélvelo a su lugar cuando termines de usarlo".',
   errores:'No dejes platos sucios en remojo más de una hora — generan mal olor y bacterias.',
   info:'Una cocina limpia antes de empezar a cocinar hace que la experiencia sea más placentera y creativa.'},
  {id:44,cat:'cocina',emoji:'🏺',titulo:'Organización del gabinete y despensa',nivel:'Básico',min:2,
   resumen:'Una despensa organizada evita comprar lo que ya tienes, reduciendo el gasto semanal y el desperdicio de alimentos.',
   pasos:['Principio FIFO: los alimentos más nuevos van atrás, los más viejos adelante.','Agrupa por categoría: granos, enlatados, condimentos, snacks.','Los artículos de uso diario (aceite, sal, azúcar) en el nivel más accesible.','Revisa fechas de vencimiento mensualmente y coloca los próximos a vencer adelante.','Etiqueta recipientes transparentes con el nombre del alimento y fecha de apertura.'],
   consejo:'Haz un inventario de la despensa antes de cada compra del mercado — reduces compras duplicadas.',
   errores:'No guardar papas y cebollas juntas — se pudren más rápido. No guardar cereal abierto sin bolsa cerrada.',
   info:'Los alimentos almacenados en recipientes herméticos de vidrio o plástico duran el doble que en sus empaques originales.'},

  // ── NIÑOS (10) ───────────────────────────────
  {id:45,cat:'ninos',emoji:'👶',titulo:'Rutina de sueño para bebés 0-12 meses',nivel:'Básico',min:2,
   resumen:'Una rutina de sueño consistente ayuda a los bebés a desarrollar su reloj biológico y a dormir mejor para toda la familia.',
   pasos:['Establece el mismo horario de inicio de rutina cada noche (ej: 7:00 PM).','Secuencia: baño tibio → masaje suave → pijama → alimentación → canción o cuento breve.','Oscurece el cuarto y baja el nivel de ruido 30 minutos antes.','Coloca al bebé soñoliento pero despierto para que aprenda a dormirse solo.','Evita el teléfono o pantallas durante la rutina — el bebé necesita tu presencia total.'],
   consejo:'La "hora mágica" para iniciar la rutina del bebé es cuando empieza a frotarse los ojos o bostezan seguido.',
   errores:'No cambiar la rutina de forma abrupta — toma 3 días establecer un nuevo hábito de sueño.',
   info:'La OMS recomienda que los bebés hasta 1 año duerman boca arriba para reducir el riesgo de muerte súbita.'},
  {id:46,cat:'ninos',emoji:'🍼',titulo:'Preparación segura de biberones',nivel:'Básico',min:2,
   resumen:'Preparar y esterilizar biberones correctamente es fundamental para la salud del bebé, que aún no tiene defensas completamente desarrolladas.',
   pasos:['Lava tus manos con agua y jabón antes de preparar cualquier biberón.','Esteriliza los biberones en agua hirviendo 5 minutos o en esterilizador eléctrico.','Prepara la fórmula con agua previamente hervida y enfriada a 70°C.','Mide el agua primero, luego el polvo en la proporción indicada por el fabricante.','Verifica la temperatura en tu muñeca — debe sentirse tibia, no caliente.'],
   consejo:'Prepara los biberones del día en la mañana y guárdalos en la nevera. Caliéntalos al momento de usar.',
   errores:'Nunca preparar la fórmula con más polvo del indicado — puede causar deshidratación.',
   info:'Los biberones preparados duran máximo 24 horas en nevera y 2 horas a temperatura ambiente.'},
  {id:47,cat:'ninos',emoji:'🛁',titulo:'Baño seguro para bebés y niños pequeños',nivel:'Básico',min:2,
   resumen:'El baño del bebé es un momento de vínculo y estimulación. Hacerlo seguro y calmado marca la diferencia.',
   pasos:['Prepara todo antes de llevar al bebé al baño — nunca lo dejes solo.','Temperatura del agua: 37°C. Prueba con el codo, no con la mano.','Sostén siempre la cabeza y cuello del bebé con una mano.','Limpia de adelante hacia atrás en la zona del pañal para evitar infecciones.','El cabello al final — así no se enfría durante el baño.'],
   consejo:'Canta una canción durante el baño. Los bebés asocian el sonido con la rutina y se calman más rápido.',
   errores:'Nunca dejar a un bebé solo en el baño ni un segundo — el riesgo de ahogamiento es real incluso con poca agua.',
   info:'No es necesario bañar a los bebés todos los días. 3-4 veces por semana es suficiente hasta que empiezan a gatear.'},
  {id:48,cat:'ninos',emoji:'🤒',titulo:'Fiebre en niños: cuándo actuar',nivel:'Intermedio',min:2,
   resumen:'La fiebre es el mecanismo de defensa del cuerpo contra infecciones. Saber cuándo es preocupante evita visitas innecesarias al médico y situaciones de riesgo.',
   pasos:['Mide la temperatura correctamente: termómetro digital rectal (bebés), axilar (niños mayores).','Fiebre leve (37.5-38.5°C): baño tibio, ropa ligera, mucho líquido.','Fiebre moderada (38.5-39.5°C): ibuprofeno o acetaminofén según peso indicado por el médico.','Aplica paños húmedos tibios (no fríos) en frente, cuello y axilas.','Observa otros síntomas: dificultad para respirar, rigidez de cuello, sarpullido.'],
   consejo:'Nunca interrumpas el sueño de un niño con fiebre para darle medicina — el sueño es curativo.',
   errores:'No uses aspirina en niños menores de 12 años — puede causar síndrome de Reye, una enfermedad grave.',
   info:'Ve a urgencias inmediatamente si: bebé menor de 3 meses con fiebre, fiebre mayor a 40°C, convulsiones.'},
  {id:49,cat:'ninos',emoji:'📚',titulo:'Espacio de estudio en casa',nivel:'Básico',min:1,
   resumen:'Un espacio dedicado al estudio mejora la concentración, los hábitos y el rendimiento escolar de los niños.',
   pasos:['Escoge un lugar fijo, con buena iluminación natural y alejado del televisor.','La silla y el escritorio deben ser del tamaño adecuado para el niño.','Organiza el material escolar en un sistema simple que el niño pueda mantener solo.','Establece un horario de estudio fijo todos los días — la rutina ayuda.','Silencia el teléfono y reduce interrupciones durante el tiempo de estudio.'],
   consejo:'Usa temporizador de 25 minutos de estudio + 5 de descanso (técnica Pomodoro) para niños mayores de 8 años.',
   errores:'No hacer las tareas por ellos — guía, no sustituyas. El esfuerzo desarrolla el aprendizaje.',
   info:'Los niños necesitan al menos 30 minutos de actividad física antes de sentarse a estudiar para mejorar la concentración.'},
  {id:50,cat:'ninos',emoji:'🧸',titulo:'Organización del cuarto de los niños',nivel:'Básico',min:2,
   resumen:'Un cuarto organizado fomenta la autonomía y la responsabilidad en los niños desde temprana edad.',
   pasos:['Usa etiquetas con fotos (no solo texto) para que los niños pequeños sepan dónde va cada cosa.','Organiza por zonas: juguetes, ropa, libros, materiales escolares.','El sistema de organización debe ser simple — si el niño no puede mantenerlo solo, es muy complejo.','Haz limpieza y descarte de juguetes con el niño cada 6 meses.','Enseña el hábito: "antes de sacar algo nuevo, guarda lo que estabas usando".'],
   consejo:'Involucra al niño en la organización de su cuarto — sentirá el espacio como suyo y lo cuidará mejor.',
   errores:'No organizar sin el niño presente — no sabrá dónde están las cosas y deshará el sistema en días.',
   info:'La regla "un juguete entra, uno sale" ayuda a mantener la cantidad de juguetes manejable con el tiempo.'},
  {id:51,cat:'ninos',emoji:'🍱',titulo:'Lonchera escolar nutritiva y equilibrada',nivel:'Básico',min:1,
   resumen:'Una lonchera equilibrada mejora la concentración y el rendimiento escolar. Los niños que comen bien aprenden mejor.',
   pasos:['Incluye siempre: proteína (huevo, pollo, queso), carbohidrato (pan, galletas integrales) y fruta.','Prepara la lonchera la noche anterior para ahorrar tiempo en la mañana.','Usa recipientes herméticos para evitar que los alimentos se humedezcan.','Incluye una botella de agua — nunca jugo de caja o refresco.','Varía el menú — pregunta al niño qué quiere para la semana.'],
   consejo:'Un trozo de hielo en la lonchera mantiene los alimentos fríos y seguros por más de 4 horas.',
   errores:'No incluir alimentos que no han sido probados en casa — el colegio no es el lugar para probar cosas nuevas.',
   info:'Los alimentos perecederos (lácteos, carnes) solo son seguros 2-3 horas sin refrigeración.'},
  {id:52,cat:'ninos',emoji:'🩹',titulo:'Primeros auxilios básicos para niños',nivel:'Intermedio',min:3,
   resumen:'Saber qué hacer en los primeros minutos ante una emergencia con niños puede hacer la diferencia entre una lesión leve y una grave.',
   pasos:['Herida leve: lava con agua y jabón, aplica antiséptico, cubre con curita limpia.','Sangrado moderado: presión directa con paño limpio mínimo 10 minutos sin levantar.','Golpe en la cabeza: hielo envuelto en tela, observa 24 horas.','Quemadura leve: agua fría corriente 10 minutos. Nunca mantequilla ni pasta dental.','Atragantamiento: 5 golpes en la espalda o maniobra de Heimlich según la edad.'],
   consejo:'Aprende la maniobra de Heimlich y RCP básico. Hay cursos gratuitos en Cruz Roja Panameña.',
   errores:'No aplicar alcohol directamente en heridas — irrita y daña el tejido. Solo agua y jabón.',
   info:'Señales de alerta post-golpe en cabeza: vómito repetido, somnolencia extrema, pupila desigual. Ir a urgencias.'},
  {id:53,cat:'ninos',emoji:'💊',titulo:'Administración segura de medicamentos a niños',nivel:'Intermedio',min:2,
   resumen:'Dar medicamentos a niños requiere precisión en la dosis y el método. Un error puede ser peligroso.',
   pasos:['Siempre verifica que el medicamento sea para la edad y el peso del niño.','Lee el prospecto completo antes de la primera dosis.','Usa la jeringa o cuchara dosificadora incluida — no use cucharas de cocina.','Registra la hora de cada dosis para no repetir accidentalmente.','Guarda todos los medicamentos en lugar seguro, fuera del alcance de los niños.'],
   consejo:'Para niños que no quieren el medicamento: mezcla con una pequeña cantidad de miel o jugo (solo si el médico lo permite).',
   errores:'Nunca dobles la dosis si el niño vomitó justo después — espera y consulta al médico.',
   info:'El acetaminofén y el ibuprofeno no deben darse juntos sin instrucción médica. Consulta siempre las interacciones.'},
  {id:54,cat:'ninos',emoji:'🌙',titulo:'Rutina de higiene dental infantil',nivel:'Básico',min:1,
   resumen:'Los hábitos de higiene dental formados en la infancia duran toda la vida. La caries es la enfermedad crónica más común en niños.',
   pasos:['Desde los primeros dientes: limpiar con gasa húmeda después de cada toma.','Desde 2 años: cepillo suave dos veces al día, pasta tamaño un guisante.','Desde 3 años: enseña a cepillar en movimiento circular y a escupir la pasta.','Hilo dental: desde que hay dos dientes que se tocan.','Primera visita al dentista: a los 12 meses o cuando aparece el primer diente.'],
   consejo:'Usa un temporizador de 2 minutos o una canción corta para que el niño sepa cuánto tiempo debe cepillarse.',
   errores:'No uses pasta con flúor en menores de 2 años. No dejes al niño dormirse con biberón de leche o jugo.',
   info:'Los niños no pueden cepillarse solos con efectividad hasta los 6-7 años — necesitan supervisión o ayuda del adulto.'},

  // ── MASCOTAS (10) ────────────────────────────
  {id:55,cat:'mascotas',emoji:'🐶',titulo:'Alimentos tóxicos para perros',nivel:'Básico',min:2,
   resumen:'Muchos alimentos del hogar son peligrosos o letales para los perros. Conocer la lista puede salvar la vida de tu mascota.',
   pasos:['Chocolate: contiene teobromina, muy tóxica para perros. Nunca en ninguna cantidad.','Uvas y pasas: pueden causar insuficiencia renal aguda aunque sea en pequeña cantidad.','Cebolla y ajo: destruyen los glóbulos rojos y causan anemia.','Xilitol (edulcorante en chicles y dulces): causa hipoglucemia severa y daño hepático.','Aguacate, macadamia, alcohol y cafeína también son tóxicos.'],
   consejo:'Guarda la basura en un lugar que el perro no pueda acceder — es donde más accidentes ocurren.',
   errores:'No creer que "una pequeña cantidad no hace daño" — con el chocolate y el xilitol cualquier cantidad es peligrosa.',
   info:'Si sospechas que tu perro ingirió algo tóxico: llama al veterinario inmediatamente. No induzcas el vómito sin instrucción.'},
  {id:56,cat:'mascotas',emoji:'🐱',titulo:'Alimentos tóxicos para gatos',nivel:'Básico',min:2,
   resumen:'Los gatos tienen metabolismos más sensibles que los perros. Muchos alimentos seguros para humanos son peligrosos para ellos.',
   pasos:['Cebolla, ajo y cebollín: destruyen glóbulos rojos y causan anemia hemolítica.','Uvas y pasas: toxicidad renal grave.','Leche: los gatos adultos son intolerantes a la lactosa — causa diarrea.','Atún en exceso: causa deficiencia de vitamina E y problemas musculares.','Chocolate, cafeína, alcohol y xilitol son igualmente peligrosos para los gatos.'],
   consejo:'Los gatos son muy buenos escondiendo el malestar. Cualquier cambio de comportamiento después de comer algo inusual requiere visita veterinaria.',
   errores:'No dar comida de perro a los gatos — no tienen los nutrientes que los felinos necesitan.',
   info:'Los gatos necesitan taurina (proteína animal) que no sintetizan solos. Una dieta vegetariana puede ser mortal para un gato.'},
  {id:57,cat:'mascotas',emoji:'🦮',titulo:'Rutina de aseo del perro en casa',nivel:'Básico',min:3,
   resumen:'Mantener limpio al perro en casa reduce los olores, las alergias y las visitas al groomer profesional.',
   pasos:['Cepillado: diario para razas de pelo largo, 2-3 veces por semana para pelo corto.','Baño: cada 3-4 semanas o cuando esté notablemente sucio.','Usa shampoo específico para perros — el de humanos altera el pH de su piel.','Limpia las orejas mensualmente con solución específica y algodón (nunca hisopos).','Corta las uñas mensualmente o cuando escuches el ruido al caminar.'],
   consejo:'Introduce el cepillo desde cachorro para que lo asocien con algo positivo. Un premio durante y después ayuda.',
   errores:'No bañes al perro con agua muy caliente ni lo seques con secador en máxima potencia — los quema.',
   info:'Si el perro sacude la cabeza frecuentemente o se rasca las orejas, puede tener infección. Visita veterinaria.'},
  {id:58,cat:'mascotas',emoji:'🐾',titulo:'Limpieza del hogar con mascotas',nivel:'Básico',min:2,
   resumen:'Tener mascotas en casa requiere rutinas de limpieza adicionales para mantener el hogar libre de pelo, olores y bacterias.',
   pasos:['Aspira las áreas donde descansa la mascota al menos 3 veces por semana.','Lava la cama, cobija y juguetes de tela mensualmente con agua caliente.','Limpia los platos de comida y agua a diario con agua y jabón.','Para manchas de orina en alfombra: agua fría + enzimático. Nunca amoníaco — atrae al animal al mismo lugar.','Mantén el arenero del gato limpio diariamente y cambia la arena completamente semanalmente.'],
   consejo:'Un robot aspirador programado para limpiar de noche reduce enormemente la acumulación de pelo.',
   errores:'No usar cloro directamente donde la mascota accede — los pulmones y patas de los animales son muy sensibles.',
   info:'El pelo de mascota en el aire puede agravar alergias y asma. Los filtros HEPA en aspiradoras son muy recomendados.'},
  {id:59,cat:'mascotas',emoji:'🩺',titulo:'Señales de que tu mascota está enferma',nivel:'Intermedio',min:2,
   resumen:'Las mascotas no pueden comunicar su malestar con palabras. Reconocer señales tempranas puede salvarles la vida.',
   pasos:['Cambio en el apetito o el agua: comer o tomar mucho más o mucho menos de lo habitual.','Letargia: no quiere jugar ni moverse, permanece inactivo más de un día.','Cambios en las heces: diarrea, sangre, mucosa o muy duras.','Vómito: uno aislado no es grave, repetido o con sangre es urgente.','Cambios físicos: pelo opaco, pérdida de peso, ojos rojos o llorosos.'],
   consejo:'Pesa a tu mascota mensualmente. La pérdida de peso es uno de los primeros signos de enfermedad.',
   errores:'No esperar "a ver si mejora solo" más de 48 horas. Con animales, la demora puede ser fatal.',
   info:'Los gatos son especialmente buenos ocultando dolor — cuando muestran señales ya suelen estar muy enfermos.'},
  {id:60,cat:'mascotas',emoji:'💉',titulo:'Calendario de vacunas y desparasitación',nivel:'Básico',min:2,
   resumen:'Mantener el calendario de vacunas y desparasitación al día protege a tu mascota y a toda la familia.',
   pasos:['Perros: DHPP (moquillo, parvo, hepatitis) anual. Rabia cada 1-3 años según la ley local.','Gatos: Triple felina anual. Rabia según regulación local.','Desparasitación interna: cada 3 meses para mascotas que salen, cada 6 para las que no.','Desparasitación externa (pulgas y garrapatas): mensual o cada 3 meses según el producto.','Guarda todos los registros en una carpeta o app veterinaria.'],
   consejo:'Coloca un recordatorio en el teléfono para cada vacuna y desparasitación — es fácil olvidar sin sistema.',
   errores:'No comprar vacunas sin refrigeración adecuada ni aplicarlas sin experiencia — pueden perder efectividad.',
   info:'En Panamá, la vacuna antirrábica es obligatoria por ley para perros y gatos. Es gratuita en el MIDA.'},
  {id:61,cat:'mascotas',emoji:'🏃',titulo:'Ejercicio y estimulación mental para perros',nivel:'Básico',min:2,
   resumen:'Un perro con suficiente ejercicio y estimulación mental no destruye cosas, no ladra en exceso y es más tranquilo en casa.',
   pasos:['Camina mínimo 30 minutos dos veces al día, según la raza y edad del perro.','El olfateo es el ejercicio mental más agotador — deja que explore durante el paseo.','Juegos de inteligencia: buscar comida escondida, juguetes rellenos de snacks.','Entrenamiento de 10 minutos diarios — aprende comandos nuevos y se cansa mentalmente.','Socialización con otros perros: importante especialmente en cachorros.'],
   consejo:'Un perro cansado es un perro tranquilo. El 80% de los problemas de comportamiento son por falta de ejercicio.',
   errores:'No sacar al perro solo para hacer sus necesidades y entrar — necesita explorar y oler.',
   info:'Las razas de trabajo (border collie, husky, pastor alemán) necesitan el doble de ejercicio que las razas de compañía.'},
  {id:62,cat:'mascotas',emoji:'🐟',titulo:'Cuidado de peces y acuarios',nivel:'Intermedio',min:2,
   resumen:'Los peces requieren mantenimiento constante del agua para vivir saludables. Un acuario mal mantenido puede perder todos sus peces en días.',
   pasos:['Cambia el 20-25% del agua cada semana — nunca toda el agua a la vez.','El agua nueva debe ser tratada con acondicionador antes de agregar al acuario.','Alimenta pequeñas cantidades 2 veces al día — el exceso contamina el agua.','Limpia el filtro mensualmente con agua del mismo acuario (no del grifo).','Mantén la temperatura estable: tropicales 24-28°C, de agua fría 18-22°C.'],
   consejo:'El test de agua (pH, amonio, nitratos) es la herramienta más importante del acuarista — hazlo semanalmente.',
   errores:'No laves las piedras ni las plantas del acuario con jabón — eliminas las bacterias beneficiosas que limpian el agua.',
   info:'El "síndrome del pez nuevo" o nuevo acuario puede matar peces en días. El acuario necesita ciclarse 2-4 semanas antes de añadir peces.'},
  {id:63,cat:'mascotas',emoji:'🐹',titulo:'Cuidado de hamsters y roedores pequeños',nivel:'Básico',min:2,
   resumen:'Los hamsters son animales de bajo mantenimiento pero con necesidades específicas que deben cubrirse para que vivan felices.',
   pasos:['Jaula mínima: 60x40 cm para un hamster. Más grande siempre es mejor.','Limpieza de jaula: cada semana completa, sin dejar olor a limpiador.','Alimentación: mix de semillas, vegetales frescos (sin cebolla, ajo, citrus).','Ejercicio: rueda de al menos 20 cm de diámetro, sólida (sin rejillas).','Socialización: los hamsters sirios son solitarios — nunca juntes dos.'],
   consejo:'Deja que el hamster se acostumbre al olor de tu mano antes de intentar cargarlo — lo morderá si se asusta.',
   errores:'No despertes al hamster durante el día — son nocturnos y el estrés por despertar acorta su vida.',
   info:'Los hamsters no hacen ningún ruido de dolor, solo chirrían cuando están muy asustados. Observa su comportamiento.'},
  {id:64,cat:'mascotas',emoji:'🐢',titulo:'Cuidado de tortugas en casa',nivel:'Intermedio',min:2,
   resumen:'Las tortugas pueden vivir más de 50 años con los cuidados correctos. Son mascotas de bajo mantenimiento pero con requisitos específicos.',
   pasos:['Terrestres: necesitan terrario seco con zona de calor (35°C) y zona fresca (24°C).','Acuáticas: agua limpia con filtro, zona seca para asolearse (basking).','Alimentación variada: verduras de hoja oscura, insectos, frutas ocasionalmente.','Luz UVB: indispensable para sintetizar vitamina D3 y que no se rompan el caparazón.','Veterinario reptilólogo: no cualquier vet atiende tortugas — busca uno especialista.'],
   consejo:'Las tortugas son lentas pero necesitan más espacio del que parece — su instinto es caminar kilómetros.',
   errores:'No alimentes solo con lechuga iceberg — tiene muy poco valor nutricional y puede causar deficiencias.',
   info:'Las tortugas no se deben separar de su hábitat natural. Las tortugas de río en Panamá están protegidas por ley.'},

  // ── ORGANIZACIÓN (6) ─────────────────────────
  {id:65,cat:'organizacion',emoji:'📦',titulo:'Sistema KonMari para ordenar el hogar',nivel:'Intermedio',min:3,
   resumen:'El método KonMari de Marie Kondo transforma el hogar de raíz organizando por categoría, no por cuarto.',
   pasos:['Ordena en este orden: ropa → libros → papeles → komono (misceláneos) → artículos sentimentales.','Para cada objeto pregunta: ¿me produce alegría? Si no, agrádecelo y deshazte de él.','Dobla la ropa en posición vertical para verlo todo de un vistazo.','Todo debe tener un lugar específico. Lo que no tiene lugar, sobra.','Haz el proceso completo de una sola vez, no poco a poco.'],
   consejo:'Empieza siempre por la ropa — es la categoría más fácil y da la motivación para seguir con el resto.',
   errores:'No intentar organizar mientras hay caos — primero descarta, luego organiza.',
   info:'El objetivo del KonMari no es tener poco, sino tener solo lo que realmente valoras y usa.'},
  {id:66,cat:'organizacion',emoji:'📋',titulo:'Sistema de listas y tareas del hogar',nivel:'Básico',min:1,
   resumen:'Un sistema de listas efectivo para el hogar reduce el estrés, los olvidos y las discusiones sobre quién hace qué.',
   pasos:['Define una lista semanal de tareas con responsable y día asignado.','Usa una pizarra, una app o una libreta en un lugar visible para todos.','Diferencia tareas diarias (barrer, lavar platos) de semanales y mensuales.','Revisa el sistema cada mes y ajusta lo que no funciona.','Involucra a todos los miembros del hogar, incluyendo a los niños según su edad.'],
   consejo:'My Nana App es la herramienta perfecta para gestionar y dar seguimiento a todas las tareas del hogar.',
   errores:'No crear sistemas demasiado complejos que nadie va a mantener después de la primera semana.',
   info:'Los estudios muestran que los hogares con distribución clara de tareas tienen menos conflictos y mayor satisfacción.'},
  {id:67,cat:'organizacion',emoji:'🗃️',titulo:'Organización de documentos del hogar',nivel:'Básico',min:2,
   resumen:'Tener los documentos del hogar organizados evita el pánico cuando los necesitas y protege la información importante de la familia.',
   pasos:['Categorías básicas: identidades, médicos, seguros, contratos, garantías, finanzas.','Usa una carpeta acordeón o cajas de archivos etiquetadas por categoría.','Escanea los documentos más importantes y guárdalos en la nube.','Revisa y actualiza la carpeta una vez al año.','Guarda los originales en un lugar seguro, fuera del alcance de los niños.'],
   consejo:'Una foto en el teléfono de cada documento importante es el backup más simple y efectivo.',
   errores:'No guardar documentos en bolsas de plástico — la humedad los deteriora con el tiempo.',
   info:'Los documentos importantes (escrituras, testamentos, actas) deben tener copia en lugar separado, idealmente con un familiar.'},
