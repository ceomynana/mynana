// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
let catActiva = 'todas';
let busqueda  = '';
let filtros   = { nivel:[], tiempo:[], estado:[] };
let favoritos = JSON.parse(localStorage.getItem('mn_favs') || '[]');
let completadas = JSON.parse(localStorage.getItem('mn_completadas') || '[]');
let guiaActual  = null;

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => document.getElementById('splash').classList.add('out'), 900);
  renderCats();
  renderGrid();
  renderFeatured();
  actualizarProgreso();
});

function renderCats() {
  const scroll = document.getElementById('catsScroll');
  scroll.innerHTML = CATS.map(c => `
    <button class="cat-pill${c.id===catActiva?' activa':''}" onclick="selectCat('${c.id}')">
      ${c.emoji} ${c.label}
    </button>`).join('');
}

function selectCat(id) {
  catActiva = id;
  renderCats();
  renderGrid();
  renderFeatured();
}

function guiasFiltradas() {
  return GUIAS.filter(g => {
    if (catActiva !== 'todas' && g.cat !== catActiva) return false;
    if (busqueda) {
      const q = busqueda.toLowerCase();
      if (!g.titulo.toLowerCase().includes(q) && !g.resumen.toLowerCase().includes(q)) return false;
    }
    if (filtros.nivel.length && !filtros.nivel.includes(g.nivel)) return false;
    if (filtros.tiempo.length && !filtros.tiempo.includes(String(g.min))) return false;
    if (filtros.estado.includes('guardada') && !favoritos.includes(g.id)) return false;
    if (filtros.estado.includes('completada') && !completadas.includes(g.id)) return false;
    if (filtros.estado.includes('pendiente') && completadas.includes(g.id)) return false;
    return true;
  });
}

function nivelColor(n) {
  return n==='Básico'?'nivel-basico':n==='Intermedio'?'nivel-intermedio':'nivel-avanzado';
}

function renderFeatured() {
  const todas = catActiva==='todas'?GUIAS:GUIAS.filter(g=>g.cat===catActiva);
  const featured = todas.find(g=>g.cat==='emergencias')||todas[Math.floor(Math.random()*todas.length)]||GUIAS[0];
  const cat = CATS.find(c=>c.id===featured.cat);
  const fav = favoritos.includes(featured.id);
  const done = completadas.includes(featured.id);
  document.getElementById('guiaFeatured').innerHTML = `
    <div class="guia-featured" onclick="openGuia(${featured.id})">
      <div class="guia-featured-img" style="background:${CAT_COLORS[featured.cat]||'#E8F5E9'}">
        <span style="font-size:80px;">${featured.emoji}</span>
        <div class="guia-featured-overlay"></div>
        <span class="guia-featured-badge">${done?'✅ Completada':'⭐ Destacada'}</span>
        <button class="guia-featured-fav${fav?' saved':''}" onclick="event.stopPropagation();toggleFav(${featured.id})" aria-label="Guardar">
          ${fav?'♥':'♡'}
        </button>
      </div>
      <div class="guia-featured-info">
        <div class="guia-featured-cat">${cat?cat.emoji+' '+cat.label:''}</div>
        <div class="guia-featured-title">${featured.titulo}</div>
        <div class="guia-featured-meta">
          <span>📖 ${featured.min} min</span>
          <span>·</span>
          <span>${featured.nivel}</span>
          <span>·</span>
          <span>${featured.pasos.length} pasos</span>
        </div>
      </div>
    </div>`;
}

function renderGrid() {
  const gfs = guiasFiltradas();
  const cnt = document.getElementById('secCount');
  if (cnt) cnt.textContent = gfs.length;
  const grid = document.getElementById('guiasGrid');
  if (!grid) return;
  if (!gfs.length) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1">
      <div style="font-size:40px;margin-bottom:10px;">🔍</div>
      <div style="font-size:15px;font-weight:500;color:var(--txt);margin-bottom:6px;">Sin resultados</div>
      <div style="font-size:13px;color:var(--txt2);">Intenta con otro término o categoría</div>
    </div>`; return;
  }
  grid.innerHTML = gfs.map(g => {
    const fav = favoritos.includes(g.id);
    const done = completadas.includes(g.id);
    return `
      <div class="guia-card" onclick="openGuia(${g.id})">
        <div class="guia-thumb" style="background:${CAT_COLORS[g.cat]||'#F0F7F4'}">
          <span>${g.emoji}</span>
          <span class="guia-nivel-badge ${nivelColor(g.nivel)}">${g.nivel}</span>
          <button class="guia-fav${fav?' saved':''}" onclick="event.stopPropagation();toggleFav(${g.id})" aria-label="Guardar">
            ${fav?'♥':'♡'}
          </button>
        </div>
        <div class="guia-info">
          <span class="guia-cat-tag">${CATS.find(c=>c.id===g.cat)?.emoji||''} ${CATS.find(c=>c.id===g.cat)?.label||''}</span>
          <div class="guia-title">${g.titulo}</div>
          <div class="guia-meta">
            <span>📖 ${g.min} min</span>
            ${done?'<span class="guia-completada-mark">✅</span>':''}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// DETALLE GUÍA
// ═══════════════════════════════════════════════
function openGuia(id) {
  guiaActual = GUIAS.find(g => g.id===id);
  if (!guiaActual) return;
  const g = guiaActual;
  const fav = favoritos.includes(g.id);
  const done = completadas.includes(g.id);
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-hero" style="background:${CAT_COLORS[g.cat]||'#F0F7F4'}">
      <span style="font-size:90px;">${g.emoji}</span>
      <div class="modal-hero-actions">
        <button class="modal-fav-btn${fav?' saved':''}" id="mFav" onclick="toggleFav(${g.id});updateModalFav()" aria-label="Guardar">${fav?'♥':'♡'}</button>
        <button class="modal-close-btn" onclick="closeModal()" aria-label="Cerrar">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-badges">
        <span class="modal-badge-cat">${CATS.find(c=>c.id===g.cat)?.emoji||''} ${CATS.find(c=>c.id===g.cat)?.label||''}</span>
        <span class="modal-badge-nivel ${nivelColor(g.nivel)}">${g.nivel}</span>
        <span class="modal-badge-tiempo">📖 ${g.min} min</span>
      </div>
      <div class="modal-titulo">${g.titulo}</div>
      <div class="modal-resumen">${g.resumen}</div>

      <div class="modal-section-lbl">Paso a paso</div>
      <div class="pasos-list">
        ${g.pasos.map((p,i)=>`
          <div class="paso">
            <div class="paso-num">${i+1}</div>
            <div class="paso-texto">${p}</div>
          </div>`).join('')}
      </div>

      <div class="modal-section-lbl">Consejo My Nana</div>
      <div class="consejo-box">
        <div class="consejo-label">💚 Consejo</div>
        <div class="consejo-txt">${g.consejo}</div>
      </div>

      <div class="modal-section-lbl">Errores comunes</div>
      <div class="error-box">
        <div class="error-label">⚠️ Evita esto</div>
        <div class="consejo-txt">${g.errores}</div>
      </div>

      <div class="modal-section-lbl">Información importante</div>
      <div class="info-box">
        <div class="info-label">ℹ️ Recuerda</div>
        <div class="consejo-txt">${g.info}</div>
      </div>

      <div class="modal-footer">
        <button class="completar-btn${done?' done':''}" id="mCompletarBtn" onclick="toggleCompletar(${g.id})">
          ${done?'✅ Guía completada — Desmarcar':'✓ Marcar como completada'}
        </button>
        <button class="cerrar-btn" onclick="closeModal()">← Volver al Centro de Conocimiento</button>
        <div class="modal-date">Actualizado: Junio 2026</div>
      </div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function updateModalFav() {
  if (!guiaActual) return;
  const fav = favoritos.includes(guiaActual.id);
  const btn = document.getElementById('mFav');
  if (btn) { btn.textContent = fav?'♥':'♡'; btn.classList.toggle('saved', fav); }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
  document.body.style.overflow = '';
  renderGrid();
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ═══════════════════════════════════════════════
// FAVORITOS & COMPLETADAS
// ═══════════════════════════════════════════════
function toggleFav(id) {
  if (favoritos.includes(id)) favoritos = favoritos.filter(f=>f!==id);
  else favoritos.push(id);
  localStorage.setItem('mn_favs', JSON.stringify(favoritos));
  showToast(favoritos.includes(id)?'♥ Guardada en tus guías':'Eliminada de guardadas');
  if (document.getElementById('view-favoritos').classList.contains('activa')) renderFavoritos();
}

function toggleCompletar(id) {
  if (completadas.includes(id)) completadas = completadas.filter(c=>c!==id);
  else completadas.push(id);
  localStorage.setItem('mn_completadas', JSON.stringify(completadas));
  const btn = document.getElementById('mCompletarBtn');
  const done = completadas.includes(id);
  if (btn) { btn.textContent = done?'✅ Guía completada — Desmarcar':'✓ Marcar como completada'; btn.classList.toggle('done', done); }
  showToast(done?'✅ ¡Guía completada!':'Desmarcada como completada');
  actualizarProgreso();
}

// ═══════════════════════════════════════════════
// BÚSQUEDA Y FILTROS
// ═══════════════════════════════════════════════
function onSearch() {
  busqueda = document.getElementById('searchInput').value.trim();
  const clr = document.getElementById('searchClear');
  clr.style.display = busqueda ? 'flex' : 'none';
  renderGrid();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  busqueda = '';
  document.getElementById('searchClear').style.display = 'none';
  renderGrid();
}

function openFilter() {
  document.getElementById('filterPanel').classList.add('visible');
}

function closeFilterOutside(e) {
  if (e.target === document.getElementById('filterPanel')) closeFilter();
}

function closeFilter() {
  document.getElementById('filterPanel').classList.remove('visible');
}

function toggleFilter(el) {
  const tipo = el.dataset.filter;
  const val  = el.dataset.val;
  const arr  = filtros[tipo];
  const idx  = arr.indexOf(val);
  if (idx > -1) arr.splice(idx, 1); else arr.push(val);
  el.classList.toggle('sel', arr.includes(val));
  const activo = Object.values(filtros).some(a=>a.length>0);
  document.getElementById('filterBtn').classList.toggle('active', activo);
}

function clearFilters() {
  filtros = { nivel:[], tiempo:[], estado:[] };
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('sel'));
  document.getElementById('filterBtn').classList.remove('active');
}

function applyFilters() {
  closeFilter();
  renderGrid();
}

// ═══════════════════════════════════════════════
// TABS Y VISTAS
// ═══════════════════════════════════════════════
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('activo'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('activa'));
  document.getElementById('tab-'+id).classList.add('activo');
  document.getElementById('view-'+id).classList.add('activa');
  if (id==='favoritos') renderFavoritos();
  if (id==='progreso') renderProgreso();
}

function renderFavoritos() {
  const container = document.getElementById('favContent');
  const favGuias = GUIAS.filter(g=>favoritos.includes(g.id));
  if (!favGuias.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-emoji">♡</div>
      <div class="empty-title">Sin guías guardadas</div>
      <div class="empty-sub">Toca el ♡ en cualquier guía para guardarla aquí y acceder rápido.</div>
    </div>`; return;
  }
  container.innerHTML = `<div style="margin-bottom:16px;">
      <div class="sec-label">Tus guías guardadas <span class="sec-count">${favGuias.length}</span></div>
    </div>`+
    favGuias.map(g=>{
      const cat = CATS.find(c=>c.id===g.cat);
      const done = completadas.includes(g.id);
      return `<div class="guia-list-item" onclick="openGuia(${g.id})">
        <div class="guia-list-thumb" style="background:${CAT_COLORS[g.cat]}">${g.emoji}</div>
        <div class="guia-list-info">
          <div class="guia-list-title">${g.titulo}</div>
          <div class="guia-list-meta">
            <span>${cat?.emoji||''} ${cat?.label||''}</span>
            <span>·</span>
            <span>📖 ${g.min} min</span>
            ${done?'<span>· ✅</span>':''}
          </div>
        </div>
        <button class="guia-list-fav" onclick="event.stopPropagation();toggleFav(${g.id});renderFavoritos()">♥</button>
      </div>`;
    }).join('');
}

// ═══════════════════════════════════════════════
// PROGRESO
// ═══════════════════════════════════════════════
const CERTIFICACIONES = [
  { id:'limpieza',  label:'Limpieza Profesional', emoji:'🧹', cats:['limpieza'] },
  { id:'cocina',    label:'Cocina My Nana',        emoji:'🍳', cats:['cocina'] },
  { id:'ninos',     label:'Cuidado de Niños',      emoji:'👶', cats:['ninos'] },
  { id:'mascotas',  label:'Cuidado de Mascotas',   emoji:'🐶', cats:['mascotas'] },
  { id:'hogar',     label:'Hogar Completo',         emoji:'🏠', cats:['hogar','organizacion'] },
  { id:'adulto',    label:'Cuidado del Adulto Mayor',emoji:'❤️', cats:['adulto'] },
];

const INSIGNIAS = [
  { id:'primera',    emoji:'🌱', nombre:'Primera guía', cond:()=>completadas.length>=1 },
  { id:'cinco',      emoji:'⭐', nombre:'5 guías leídas', cond:()=>completadas.length>=5 },
  { id:'diez',       emoji:'🏆', nombre:'10 guías leídas', cond:()=>completadas.length>=10 },
  { id:'veinte',     emoji:'💎', nombre:'20 guías leídas', cond:()=>completadas.length>=20 },
  { id:'limpiadora', emoji:'🧹', nombre:'Experta en limpieza', cond:()=>GUIAS.filter(g=>g.cat==='limpieza').every(g=>completadas.includes(g.id)) },
  { id:'chef',       emoji:'🍳', nombre:'Chef del hogar', cond:()=>GUIAS.filter(g=>g.cat==='cocina').every(g=>completadas.includes(g.id)) },
  { id:'guardian',   emoji:'🛡️', nombre:'Guardiana del hogar', cond:()=>completadas.length>=40 },
  { id:'maestra',    emoji:'🎓', nombre:'Maestra My Nana', cond:()=>completadas.length>=80 },
  { id:'emergencias',emoji:'⚠️', nombre:'Preparada ante emergencias', cond:()=>GUIAS.filter(g=>g.cat==='emergencias').every(g=>completadas.includes(g.id)) },
];

function actualizarProgreso() {
  const n = completadas.length;
  const pct = Math.round((n/GUIAS.length)*100);
  document.getElementById('progN').textContent = n;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progPct').textContent = pct+'%';
  const subs = ['Empieza leyendo tu primera guía','¡Buen inicio! Sigue aprendiendo','¡Ya eres experta en varios temas!','¡Increíble progreso! Casi completas todo','🎓 ¡Maestra My Nana!'];
  const si = Math.min(Math.floor(pct/25), 4);
  document.getElementById('progSub').textContent = subs[si];
  const insigs = INSIGNIAS.filter(i=>i.cond());
  document.getElementById('progBadges').innerHTML = insigs.slice(0,3).map(i=>
    `<span class="prog-badge">${i.emoji} ${i.nombre}</span>`).join('');
}

function renderProgreso() {
  const container = document.getElementById('progresoContent');
  const n = completadas.length;
  const pct = Math.round((n/GUIAS.length)*100);
  let html = `<div class="sec-label" style="margin-bottom:16px;">Certificaciones My Nana</div>`;
  html += CERTIFICACIONES.map(cert=>{
    const catGuias = GUIAS.filter(g=>cert.cats.includes(g.cat));
    const doneN = catGuias.filter(g=>completadas.includes(g.id)).length;
    const certPct = catGuias.length ? Math.round((doneN/catGuias.length)*100) : 0;
    const complete = certPct===100;
    return `<div class="cert-card" style="${complete?'border:2px solid var(--b);':''}">
      <div class="cert-emoji">${complete?'🎓':cert.emoji}</div>
      <div class="cert-title">${cert.label}</div>
      <div class="cert-sub">${complete?'¡Certificación completada! 🎉':`${doneN} de ${catGuias.length} guías completadas`}</div>
      <div class="cert-barra"><div class="cert-fill" style="width:${certPct}%"></div></div>
      <div class="cert-meta"><span>${certPct}% completado</span><span>${complete?'✅ Completada':'En progreso'}</span></div>
    </div>`;
  }).join('');

  html += `<div class="sec-label" style="margin-top:24px;margin-bottom:16px;">Insignias</div>`;
  html += `<div class="insig-grid">`;
  html += INSIGNIAS.map(ins=>{
    const earned = ins.cond();
    return `<div class="insig-card${earned?' earned':''}">
      <div class="insig-emoji" style="${earned?'':'filter:grayscale(1);opacity:.35;'}">${ins.emoji}</div>
      <div class="insig-name">${ins.nombre}</div>
      <div class="insig-estado">${earned?'✅ Obtenida':'Pendiente'}</div>
    </div>`;
  }).join('');
  html += `</div>`;

  html += `<div class="sec-label" style="margin-top:8px;margin-bottom:12px;">Resumen general</div>`;
  html += `<div style="background:#fff;border-radius:var(--r);border:1px solid var(--g4);padding:16px;margin-bottom:20px;">`;
  html += `<div style="display:flex;justify-content:space-between;margin-bottom:12px;">
    <div style="text-align:center;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--g);font-weight:600;">${n}</div>
      <div style="font-size:11px;color:var(--txt2);">Guías completadas</div>
    </div>
    <div style="text-align:center;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--g);font-weight:600;">${favoritos.length}</div>
      <div style="font-size:11px;color:var(--txt2);">Guías guardadas</div>
    </div>
    <div style="text-align:center;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--g);font-weight:600;">${INSIGNIAS.filter(i=>i.cond()).length}</div>
      <div style="font-size:11px;color:var(--txt2);">Insignias</div>
    </div>
  </div>`;
  html += `<div style="font-size:12px;color:var(--txt2);text-align:center;padding-top:8px;border-top:1px solid var(--g4);">
    Progreso general: ${pct}% de todas las guías</div></div>`;

  html += `<div style="background:var(--b3);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:20px;">
    <div style="font-size:18px;margin-bottom:6px;">🎓</div>
    <div style="font-size:14px;font-weight:500;color:var(--txt);margin-bottom:4px;">Certificación My Nana Maestra</div>
    <div style="font-size:12px;color:var(--txt2);line-height:1.6;">Completa todas las guías para obtener tu certificación oficial y un badge verificado en tu perfil.</div>
  </div>`;

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
