<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Nana — Ayudas para el Hogar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">
<style>
:root{--g:#1A6B52;--g2:#0F4A38;--g3:#F0F7F4;--g4:#E1F0EB;--b:#D4A5A5;--b2:#BF9090;--b3:#F7EFEF;--cr:#F9F5F0;--txt:#1A2E25;--txt2:#4A6358;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--txt);overflow-x:hidden;min-height:100vh;min-height:100dvh;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--g2);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .4s;}
#splash.oculto{opacity:0;pointer-events:none;}

/* HEADER */
.header{background:var(--g2);padding:48px 20px 16px;position:sticky;top:0;z-index:50;}
@media(min-width:768px){.header{padding-top:16px;}}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.header-logo{font-family:'Cormorant Garamond',serif;font-size:20px;color:#fff;}
.header-logo em{color:var(--b);font-style:normal;}
.header-back{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);font-size:13px;padding:7px 14px;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;}

/* BÚSQUEDA */
.buscar-wrap{padding:0 20px 14px;}
.buscar-input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;outline:none;}
.buscar-input::placeholder{color:rgba(255,255,255,.4);}
.buscar-input:focus{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);}

/* CATEGORÍAS */
.cats{display:flex;gap:8px;overflow-x:auto;padding:0 20px 14px;-ms-overflow-style:none;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:7px 16px;border-radius:99px;border:1.5px solid rgba(255,255,255,.2);background:transparent;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.cat-pill.activa{background:var(--b);border-color:var(--b);color:#fff;}
.cat-pill:hover{background:rgba(255,255,255,.1);}

/* CONTENIDO */
.contenido{padding:20px;}
.seccion-titulo{font-size:12px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* VIDEO DESTACADO */
.video-featured{background:var(--g2);border-radius:20px;overflow:hidden;margin-bottom:20px;cursor:pointer;transition:transform .2s;}
.video-featured:active{transform:scale(.98);}
.video-featured-thumb{height:200px;display:flex;align-items:center;justify-content:center;position:relative;}
.video-featured-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;}
.play-btn-big{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:24px;}
.video-featured-info{padding:16px 18px;}
.video-featured-cat{font-size:11px;font-weight:600;color:var(--b);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.video-featured-titulo{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;margin-bottom:6px;line-height:1.3;}
.video-featured-meta{font-size:12px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:8px;}

/* VIDEO CARDS GRID */
.videos-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(min-width:768px){.videos-grid{grid-template-columns:repeat(3,1fr);}}
.video-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--g4);transition:all .2s;}
.video-card:active{transform:scale(.97);}
.video-card:hover{box-shadow:0 4px 16px rgba(26,107,82,.12);transform:translateY(-2px);}
.video-thumb{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.video-thumb-emoji{font-size:36px;z-index:1;}
.video-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;}
.play-btn-sm{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:14px;}
.video-info{padding:10px 12px;}
.video-titulo{font-size:13px;font-weight:500;color:var(--txt);line-height:1.4;margin-bottom:5px;}
.video-meta{font-size:11px;color:#bbb;display:flex;align-items:center;gap:6px;}
.video-cat-tag{font-size:10px;background:var(--g3);color:var(--g);padding:2px 8px;border-radius:99px;font-weight:500;}
.video-visto{font-size:10px;color:var(--b2);display:flex;align-items:center;gap:3px;}

/* LISTA HORIZONTAL */
.videos-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none;margin-bottom:20px;}
.videos-row::-webkit-scrollbar{display:none;}
.video-row-card{flex-shrink:0;width:160px;background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--g4);}
.video-row-thumb{height:100px;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;}
.video-row-info{padding:8px 10px;}
.video-row-titulo{font-size:12px;font-weight:500;color:var(--txt);line-height:1.4;margin-bottom:3px;}
.video-row-meta{font-size:10px;color:#bbb;}

/* MODAL VIDEO */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.visible{opacity:1;pointer-events:all;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;transform:translateY(40px);transition:transform .3s;}
.modal-overlay.visible .modal-box{transform:translateY(0);}
@media(min-width:768px){.modal-overlay{align-items:center;justify-content:center;}.modal-box{border-radius:20px;max-height:80vh;}}
.modal-video-area{position:relative;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.modal-video-emoji{font-size:80px;z-index:1;}
.modal-video-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);}
.modal-play-btn{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:transform .2s;}
.modal-play-btn:hover{transform:scale(1.08);}
.modal-info{padding:20px;}
.modal-cat{font-size:11px;font-weight:600;color:var(--b2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.modal-titulo{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--txt);margin-bottom:8px;line-height:1.3;}
.modal-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:#bbb;margin-bottom:14px;}
.modal-desc{font-size:14px;color:var(--txt2);line-height:1.75;margin-bottom:20px;}
.modal-pasos{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.modal-paso{display:flex;gap:12px;align-items:flex-start;}
.paso-num{width:28px;height:28px;border-radius:50%;background:var(--g);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.paso-texto{font-size:13px;color:var(--txt2);line-height:1.6;padding-top:4px;}
.modal-close{width:100%;background:var(--cr);border:1px solid var(--g4);border-radius:99px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--txt2);cursor:pointer;}
.modal-visto-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:99px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px;transition:all .2s;}
.modal-visto-btn:hover{background:var(--g2);}
.modal-visto-btn.visto{background:var(--g3);color:var(--g);}

/* PROGRESO */
.progreso-card{background:var(--g2);border-radius:16px;padding:16px 18px;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.prog-circle{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--b);}
.prog-n{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#fff;line-height:1;}
.prog-l{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px;}
.prog-info{flex:1;}
.prog-titulo{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px;}
.prog-sub{font-size:12px;color:rgba(255,255,255,.55);}
.prog-barra{height:5px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;background:var(--b);border-radius:99px;transition:width .5s;}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--g);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:99px;z-index:300;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 16px rgba(26,107,82,.3);}
.toast.visible{transform:translateX(-50%) translateY(0);}

/* NAV INFERIOR */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--g4);padding:8px 0 20px;display:flex;z-index:50;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
.nav-icon{font-size:22px;}
.nav-label{font-size:10px;color:#bbb;font-weight:500;}
.nav-item.activo .nav-label{color:var(--g);}
.contenido{padding-bottom:100px;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div style="width:72px;height:72px;border-radius:50%;background:var(--g);border:3px solid var(--b);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:24px;color:#fff;">MN</div>

<!-- TOAST -->

<!-- HEADER -->

<!-- CONTENIDO -->
<div class="contenido" id="contenido"></div>

<!-- NAV INFERIOR -->
<div class="bottom-nav">

let videoActual = null;
let vistos = JSON.parse(localStorage.getItem('mynana_videos_vistos') || '[]');
let catActual = 'todos';
let busqueda = '';

// ── RENDER PRINCIPAL ──
function renderContenido() {
  const c = document.getElementById('contenido');
  let lista = VIDEOS;

  if (catActual !== 'todos') lista = lista.filter(v => v.cat === catActual);
  if (busqueda) lista = lista.filter(v =>
    v.titulo.toLowerCase().includes(busqueda) ||
    v.tags.some(t => t.includes(busqueda))
  );

  if (!lista.length) {
    c.innerHTML = `<div style="text-align:center;padding:48px 20px;">
      <div style="font-size:40px;margin-bottom:12px;">🔍</div>
      <div style="font-size:16px;font-weight:500;color:var(--txt);margin-bottom:6px;">Sin resultados</div>
      <div style="font-size:13px;color:var(--txt2);">Intenta con otra búsqueda</div>
    </div>`;
    return;
  }

  const totalVistos = vistos.length;
  const pct = Math.round((totalVistos / VIDEOS.length) * 100);

  let html = '';

  // Progreso personal
  html += `<div class="progreso-card">
    <div class="prog-circle">
      <div class="prog-n">${totalVistos}</div>
      <div class="prog-l">vistos</div>
    </div>
    <div class="prog-info">
      <div class="prog-titulo">Tu progreso de aprendizaje</div>
      <div class="prog-sub">${totalVistos} de ${VIDEOS.length} videos completados · ${pct}%</div>
      <div class="prog-barra"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  if (catActual === 'todos' && !busqueda) {
    // Video destacado
    const destacados = lista.filter(v => v.destacado);
    if (destacados.length) {
      const v = destacados[0];
      const visto = vistos.includes(v.id);
      html += `<div class="seccion-titulo">⭐ Video del día</div>
      <div class="video-featured" onclick="abrirVideo('${v.id}')">
        <div class="video-featured-thumb" style="background:${v.bg};">
          <div style="font-size:64px;z-index:1;">${v.emoji}</div>
          <div class="video-featured-overlay">
            <div class="play-btn-big">▶</div>
          </div>
        </div>
        <div class="video-featured-info">
          <div class="video-featured-cat">${v.cat} ${visto ? '· ✅ Visto' : ''}</div>
          <div class="video-featured-titulo">${v.titulo}</div>
          <div class="video-featured-meta">
            <span>⏱ ${v.dur}</span>
            <span>📊 ${v.nivel}</span>
            <span>${v.pasos.length} pasos</span>
          </div>
        </div>
      </div>`;
    }

    // Por categoría
    const cats = ['Cocina','Limpieza','Lavandería','Niños','Organización'];
    cats.forEach(cat => {
      const catVideos = lista.filter(v => v.cat === cat);
      if (!catVideos.length) return;
      const emojis = { 'Cocina':'🍳','Limpieza':'🧹','Lavandería':'👕','Niños':'🎒','Organización':'📦' };
      html += `<div class="seccion-titulo">${emojis[cat] || '📹'} ${cat}</div>
      <div class="videos-row">
        ${catVideos.map(v => {
          const visto = vistos.includes(v.id);
          return `<div class="video-row-card" onclick="abrirVideo('${v.id}')">
            <div class="video-row-thumb" style="background:${v.bg};">
              <span style="font-size:32px;z-index:1;">${v.emoji}</span>
              <div style="position:absolute;inset:0;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;">
                <div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:12px;">▶</div>
              </div>
              ${visto ? '<div style="position:absolute;top:6px;right:6px;background:var(--g);color:#fff;font-size:10px;padding:2px 6px;border-radius:99px;">✅</div>' : ''}
            </div>
            <div class="video-row-info">
              <div class="video-row-titulo">${v.titulo}</div>
              <div class="video-row-meta">⏱ ${v.dur}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    });

  } else {
    // Vista de grilla filtrada
    html += `<div class="seccion-titulo">📹 ${catActual === 'todos' ? 'Resultados' : catActual} (${lista.length})</div>
    <div class="videos-grid">
      ${lista.map(v => {
        const visto = vistos.includes(v.id);
        return `<div class="video-card" onclick="abrirVideo('${v.id}')">
          <div class="video-thumb" style="background:${v.bg};">
            <div class="video-thumb-emoji" style="position:relative;z-index:1;">${v.emoji}</div>
            <div class="video-play-overlay">
              <div class="play-btn-sm">▶</div>
            </div>
            ${visto ? '<div style="position:absolute;top:8px;right:8px;background:var(--g);color:#fff;font-size:10px;padding:2px 8px;border-radius:99px;">✅ Visto</div>' : ''}
          </div>
          <div class="video-info">
            <div class="video-titulo">${v.titulo}</div>
            <div class="video-meta">
              <span class="video-cat-tag">${v.cat}</span>
              <span>⏱ ${v.dur}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  c.innerHTML = html;
}

// ── ABRIR VIDEO ──
window.abrirVideo = (id) => {
  const v = VIDEOS.find(v => v.id === id);
  if (!v) return;
  videoActual = v;

  document.getElementById('modalEmoji').textContent = v.emoji;
  document.getElementById('modalThumb').style.background = v.bg;
  document.getElementById('modalCat').textContent = v.cat;
  document.getElementById('modalTitulo').textContent = v.titulo;
  document.getElementById('modalDur').textContent = `⏱ ${v.dur}`;
  document.getElementById('modalNivel').textContent = `📊 ${v.nivel}`;

  const visto = vistos.includes(v.id);
  document.getElementById('modalVistas').textContent = visto ? '✅ Ya lo viste' : '👁 Sin ver';

  document.getElementById('modalDesc').textContent = v.desc;
  document.getElementById('modalPasos').innerHTML = v.pasos.map((p, i) => `
    <div class="modal-paso">
      <div class="paso-num">${i+1}</div>
      <div class="paso-texto">${p}</div>
    </div>`).join('');

  const btnVisto = document.getElementById('btnVisto');
  if (visto) {
    btnVisto.textContent = '✅ Ya viste este video';
    btnVisto.classList.add('visto');
  } else {
    btnVisto.textContent = '✅ Marcar como visto';
    btnVisto.classList.remove('visto');
  }

  document.getElementById('modalVideo').classList.add('visible');
  document.body.style.overflow = 'hidden';
};

window.cerrarModal = () => {
  document.getElementById('modalVideo').classList.remove('visible');
  document.body.style.overflow = '';
  videoActual = null;
};

window.marcarVisto = () => {
  if (!videoActual) return;
  if (!vistos.includes(videoActual.id)) {
    vistos.push(videoActual.id);
    localStorage.setItem('mynana_videos_vistos', JSON.stringify(vistos));
    showToast('✅ Video marcado como visto');
  }
  const btn = document.getElementById('btnVisto');
  btn.textContent = '✅ Ya viste este video';
  btn.classList.add('visto');
  document.getElementById('modalVistas').textContent = '✅ Ya lo viste';
  renderContenido();
};

window.reproducirVideo = () => {
  if (!videoActual) return;
  if (videoActual.youtubeId) {
    window.open(`https://www.youtube.com/watch?v=${videoActual.youtubeId}`, '_blank');
  } else {
    showToast('📹 Video de demostración — próximamente real');
    marcarVisto();
  }
};

// ── FILTROS ──
window.filtrarCat = (cat, btn) => {
  catActual = cat;
  busqueda = '';
  document.getElementById('buscarInput').value = '';
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('activa'));
  btn.classList.add('activa');
  renderContenido();
};

window.buscarVideos = (texto) => {
  busqueda = texto.toLowerCase().trim();
  catActual = 'todos';
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('activa'));
  document.querySelector('.cat-pill').classList.add('activa');
  renderContenido();
};

// ── TOAST ──
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3000);
};

// Cerrar modal al tocar afuera
document.getElementById('modalVideo').addEventListener('click', e => {
  if (e.target === document.getElementById('modalVideo')) cerrarModal();
});

// ── INIT ──
document.getElementById('splash').classList.add('oculto');

// Leer parámetro de URL para filtrar por categoría
const urlParams = new URLSearchParams(window.location.search);
const catParam = urlParams.get('cat');
if (catParam) {
  catActual = catParam;
  const pills = document.querySelectorAll('.cat-pill');
  pills.forEach(p => {
    p.classList.remove('activa');
    if (p.textContent.includes(catParam)) p.classList.add('activa');
  });
}

renderContenido();
</script>
</body>
