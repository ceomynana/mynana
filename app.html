<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Nana — Estado del Hogar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#1A6B52;--g2:#0F4A38;--g3:#F0F7F4;--g4:#E1F0EB;--b:#D4A5A5;--b2:#BF9090;--b3:#F7EFEF;--cr:#F9F5F0;--txt:#1A2E25;--txt2:#4A6358;--r:16px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HEADER */
.app-header{background:var(--g2);padding:48px 20px 20px;position:sticky;top:0;z-index:50;}
@media(min-width:768px){.app-header{padding-top:20px;}}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.header-logo{font-family:'Cormorant Garamond',serif;font-size:20px;color:#fff;text-decoration:none;}
.header-logo em{color:var(--b);font-style:normal;}
.header-back{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);font-size:13px;padding:7px 14px;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;}

/* HERO STATUS */
.status-hero{background:var(--g2);padding:0 20px 28px;text-align:center;}
.status-circle{width:88px;height:88px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;border:3px solid rgba(255,255,255,.15);transition:all .4s;}
.status-pct{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#fff;line-height:1;}
.status-icono{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;letter-spacing:.04em;text-transform:uppercase;}
.status-titulo{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;margin-bottom:4px;}
.status-sub{font-size:12px;color:rgba(255,255,255,.55);}
.status-pulse{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.layout{max-width:680px;margin:0 auto;padding:16px;}

/* SECTION */
.seccion{background:#fff;border-radius:var(--r);border:1px solid var(--g4);overflow:hidden;margin-bottom:12px;}
.sec-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--g4);}
.sec-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sec-titulo{font-size:14px;font-weight:600;color:var(--txt);}
.sec-badge{margin-left:auto;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
.sec-body{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}

/* ITEM */
.item-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g4);}
.item-row:last-child{border-bottom:none;}
.item-emoji{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-nombre{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:11px;color:var(--txt2);margin-top:1px;}
.item-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;flex-shrink:0;}

/* STATUS BADGES */
.ok{background:var(--g3);color:var(--g);}
.warn{background:#FEF3C7;color:#92400E;}
.alert{background:#FEE2E2;color:#991B1B;}
.info{background:var(--b3);color:var(--b2);}

/* RESUMEN GENERAL */
.resumen-box{background:var(--g3);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.resumen-emoji{font-size:28px;}
.resumen-texto{font-size:13px;color:var(--g);font-weight:500;line-height:1.5;}

/* EMPTY */
.empty-item{text-align:center;padding:16px;color:#bbb;font-size:13px;}

/* FAB VOLVER */
.fab-back{position:fixed;bottom:24px;right:20px;background:var(--g);color:#fff;border:none;border-radius:99px;padding:12px 20px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(26,107,82,.3);z-index:50;}

/* GRID STATS */
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.mini-stat{background:#fff;border-radius:12px;padding:12px;text-align:center;border:1px solid var(--g4);}
.mini-stat-n{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--g);}
.mini-stat-l{font-size:10px;color:var(--txt2);margin-top:2px;}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-row">
    <a href="/app.html" class="header-logo">My <em>Nana</em></a>
    <a href="/app.html" class="header-back">← Dashboard</a>
  </div>
</div>

<div class="status-hero">
  <div class="status-circle" id="statusCircle" style="background:rgba(255,255,255,.08);">
    <div class="status-pct" id="statusPct">—</div>
    <div class="status-icono">HOY</div>
  </div>
  <div class="status-titulo" id="statusTitulo">Cargando...</div>
  <div class="status-sub"><span class="status-pulse"></span>En tiempo real</div>
</div>

<div class="layout">

  <!-- Mini stats -->
  <div class="mini-stats">
    <div class="mini-stat">
      <div class="mini-stat-n" id="mnTareas">—</div>
      <div class="mini-stat-l">Tareas completadas</div>
    </div>
    <div class="mini-stat">
      <div class="mini-stat-n" id="mnMercado">—</div>
      <div class="mini-stat-l">Compras pendientes</div>
    </div>
    <div class="mini-stat">
      <div class="mini-stat-n" id="mnMensajes">—</div>
      <div class="mini-stat-l">Mensajes nuevos</div>
    </div>
  </div>

  <!-- Resumen general -->
  <div class="resumen-box" id="resumenBox" style="display:none;">
    <div class="resumen-emoji" id="resumenEmoji">✨</div>
    <div class="resumen-texto" id="resumenTexto"></div>
  </div>

  <!-- TAREAS -->
  <div class="seccion">
    <div class="sec-header">
      <div class="sec-icon" style="background:var(--g3);">✅</div>
      <div class="sec-titulo">Tareas de hoy</div>
      <div class="sec-badge" id="badgeTareas" style="background:var(--g3);color:var(--g);">—</div>
    </div>
    <div class="sec-body" id="bodyTareas"><div class="empty-item">Cargando...</div></div>
  </div>

  <!-- MENÚ -->
  <div class="seccion">
    <div class="sec-header">
      <div class="sec-icon" style="background:#FEF7EE;">🍽️</div>
      <div class="sec-titulo">Comidas de hoy</div>
      <div class="sec-badge info" id="badgeMenu">—</div>
    </div>
    <div class="sec-body" id="bodyMenu"><div class="empty-item">Cargando...</div></div>
  </div>

  <!-- COMPRAS -->
  <div class="seccion">
    <div class="sec-header">
      <div class="sec-icon" style="background:var(--g3);">🛒</div>
      <div class="sec-titulo">Compras necesarias</div>
      <div class="sec-badge warn" id="badgeMercado">—</div>
    </div>
    <div class="sec-body" id="bodyMercado"><div class="empty-item">Cargando...</div></div>
  </div>

  <!-- COMUNICACIÓN -->
  <div class="seccion">
    <div class="sec-header">
      <div class="sec-icon" style="background:var(--b3);">💬</div>
      <div class="sec-titulo">Últimas comunicaciones</div>
      <div class="sec-badge info" id="badgeChat">—</div>
    </div>
    <div class="sec-body" id="bodyChat"><div class="empty-item">Cargando...</div></div>
  </div>

  <!-- ALERTAS -->
  <div class="seccion" id="secAlertas" style="display:none;">
    <div class="sec-header">
      <div class="sec-icon" style="background:#FEE2E2;">🔔</div>
      <div class="sec-titulo">Alertas importantes</div>
      <div class="sec-badge alert" id="badgeAlertas">—</div>
    </div>
    <div class="sec-body" id="bodyAlertas"></div>
  </div>

  <div style="height:80px;"></div>
</div>

<button class="fab-back" onclick="location.href='/app.html'">← Volver al dashboard</button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc, collection, query, where, getDocs, onSnapshot, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyDDJRJ8A8P507lllGRBOoXO30ESAH1GAnw",
  authDomain:"mynanapapp.firebaseapp.com",
  projectId:"mynanapapp",
  storageBucket:"mynanapapp.firebasestorage.app",
  messagingSenderId:"124180779437",
  appId:"1:124180779437:web:d217743000b0f1fedfd124"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function hoyStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function semanaId() {
  const hoy = new Date();
  const dia = hoy.getDay() === 0 ? 6 : hoy.getDay() - 1;
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - dia);
  return `${lunes.getFullYear()}-${String(lunes.getMonth()+1).padStart(2,'0')}-${String(lunes.getDate()).padStart(2,'0')}`;
}
function formatHora(h24) {
  if (!h24) return '';
  const [h, m] = h24.split(':').map(Number);
  return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'pm' : 'am'}`;
}

let hogarId = null;
let uid = null;
let estadoData = { tareas:[], menu:{}, mercado:[], msgs:[], alertas:[] };

onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = '/app.html'; return; }
  uid = user.uid;
  const perfil = await getDoc(doc(db, 'usuarios', uid));
  if (!perfil.exists()) { location.href = '/app.html'; return; }

  const qHogar = query(collection(db, 'hogares'), where('participantes', 'array-contains', uid));
  const snapHogar = await getDocs(qHogar);
  if (snapHogar.empty) { mostrarSinHogar(); return; }
  hogarId = snapHogar.docs[0].id;

  iniciarListeners();
});

function iniciarListeners() {
  escucharTareas();
  cargarMenu();
  cargarMercado();
  escucharChat();
}

// ── TAREAS ──
function escucharTareas() {
  const q = query(collection(db, 'hogares', hogarId, 'tareas'), orderBy('hora', 'asc'));
  onSnapshot(q, (snap) => {
    const hoy = hoyStr();
    estadoData.tareas = snap.docs.map(d => ({id:d.id,...d.data()}))
      .filter(t => t.fecha ? t.fecha === hoy : true);
    renderTareas();
    actualizarEstadoGeneral();
  });
}

function renderTareas() {
  const tareas = estadoData.tareas;
  const hechas = tareas.filter(t => t.estado === 'completa');
  const pendientes = tareas.filter(t => t.estado !== 'completa');
  const urgentes = pendientes.filter(t => t.prioridad === 'urgente');

  document.getElementById('badgeTareas').textContent = `${hechas.length}/${tareas.length}`;
  document.getElementById('mnTareas').textContent = `${hechas.length}/${tareas.length}`;

  // Alertas de urgentes
  estadoData.alertas = estadoData.alertas.filter(a => a.tipo !== 'tarea');
  urgentes.forEach(t => {
    estadoData.alertas.push({ tipo:'tarea', texto:`⚠️ ${t.nombre} — urgente`, sub: formatHora(t.hora) });
  });
  renderAlertas();

  if (!tareas.length) {
    document.getElementById('bodyTareas').innerHTML = `<div class="empty-item">Sin tareas asignadas hoy</div>`;
    return;
  }

  document.getElementById('bodyTareas').innerHTML = tareas.slice(0,6).map(t => {
    const hecha = t.estado === 'completa';
    const badgeClass = hecha ? 'ok' : t.prioridad === 'urgente' ? 'alert' : 'warn';
    const badgeText = hecha ? 'Lista ✓' : t.prioridad === 'urgente' ? 'Urgente' : formatHora(t.hora);
    return `<div class="item-row">
      <div class="item-emoji">${t.cat?.split(' ')[0] || '📋'}</div>
      <div class="item-info">
        <div class="item-nombre" style="${hecha ? 'text-decoration:line-through;color:#bbb;' : ''}">${t.nombre}</div>
        <div class="item-sub">${t.cat || ''}</div>
      </div>
      <div class="item-badge ${badgeClass}">${badgeText}</div>
    </div>`;
  }).join('') + (tareas.length > 6 ? `<div style="font-size:12px;color:var(--txt2);text-align:center;padding:8px;">+${tareas.length-6} más · <a href="/tareas.html" style="color:var(--g);">Ver todas</a></div>` : '');
}

// ── MENÚ ──
// ── MENÚ ──
function cargarMenu() {
  const hoy = new Date();
  const diaIdx = hoy.getDay() === 0 ? 6 : hoy.getDay() - 1; // 0=lunes
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - diaIdx);
  lunes.setHours(0,0,0,0);
  const sid = `${lunes.getFullYear()}-${String(lunes.getMonth()+1).padStart(2,'0')}-${String(lunes.getDate()).padStart(2,'0')}`;

  const tiempos = [
    { id:'desayuno', nombre:'Desayuno', emoji:'☀️',  hora:'7:00 am' },
    { id:'almuerzo', nombre:'Almuerzo', emoji:'🍽️', hora:'12:30 pm' },
    { id:'cena',     nombre:'Cena',     emoji:'🌙',  hora:'7:00 pm' },
  ];

  // Escuchar colección completa para encontrar el doc de esta semana
  onSnapshot(collection(db, 'hogares', hogarId, 'menus'), (snap) => {
    const weekDoc = snap.docs.find(d => d.id === sid)
      || snap.docs.sort((a,b) => b.id.localeCompare(a.id))[0];
    // menu.html guarda con claves dia_0..dia_6, NO 'lunes','martes'
    const menuDia = weekDoc ? (weekDoc.data()[`dia_${diaIdx}`] || {}) : {};
    const conPlato = tiempos.filter(t => menuDia[t.id]?.nombre);

    document.getElementById('badgeMenu').textContent = conPlato.length ? `${conPlato.length} comidas` : 'Sin planificar';

    if (!conPlato.length) {
      document.getElementById('bodyMenu').innerHTML = `<div class="empty-item">No hay menú planificado hoy · <a href="/menu.html" style="color:var(--g);">Planificar</a></div>`;
      return;
    }

    document.getElementById('bodyMenu').innerHTML = tiempos.map(t => {
      const plato = menuDia[t.id];
      if (!plato?.nombre) return '';
      return `<div class="item-row">
        <div class="item-emoji">${t.emoji}</div>
        <div class="item-info">
          <div class="item-nombre">${plato.nombre}</div>
          <div class="item-sub">${t.nombre} · ${t.hora}</div>
        </div>
        <div class="item-badge ok">Planificado</div>
      </div>`;
    }).join('');
  });
}

// ── MERCADO ──
function cargarMercado() {
  const hoy = new Date();
  const diaIdx = hoy.getDay() === 0 ? 6 : hoy.getDay() - 1;
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - diaIdx);
  lunes.setHours(0,0,0,0);
  const sid = `${lunes.getFullYear()}-${String(lunes.getMonth()+1).padStart(2,'0')}-${String(lunes.getDate()).padStart(2,'0')}`;

  // Escuchar colección completa — igual que el menú
  onSnapshot(collection(db, 'hogares', hogarId, 'mercado'), (snap) => {
    const weekDoc = snap.docs.find(d => d.id === sid)
      || snap.docs.sort((a,b) => b.id.localeCompare(a.id))[0];
    const items = weekDoc ? (weekDoc.data().items || []) : [];
    const pendientes = items.filter(i => !i.comprado);
    const comprados  = items.filter(i => i.comprado);

    document.getElementById('badgeMercado').textContent = items.length
      ? pendientes.length ? `${pendientes.length} pendientes` : 'Todo comprado'
      : 'Sin lista';
    document.getElementById('mnMercado').textContent = pendientes.length || '0';

    estadoData.alertas = estadoData.alertas.filter(a => a.tipo !== 'mercado');
    if (pendientes.length >= 5) {
      estadoData.alertas.push({ tipo:'mercado', texto:`🛒 ${pendientes.length} artículos por comprar`, sub:'Lista del mercado' });
      renderAlertas();
    }

    if (!items.length) {
      document.getElementById('bodyMercado').innerHTML = `<div class="empty-item">Lista vacía · <a href="/menu.html" style="color:var(--g);">Agregar artículos</a></div>`;
      return;
    }

    document.getElementById('bodyMercado').innerHTML = [
      ...pendientes.slice(0,5).map(i => `
        <div class="item-row">
          <div class="item-emoji">🔲</div>
          <div class="item-info"><div class="item-nombre">${i.nombre}</div></div>
          <div class="item-badge warn">Pendiente</div>
        </div>`),
      ...comprados.slice(0,2).map(i => `
        <div class="item-row">
          <div class="item-emoji">✅</div>
          <div class="item-info"><div class="item-nombre" style="text-decoration:line-through;color:#bbb;">${i.nombre}</div></div>
          <div class="item-badge ok">Comprado</div>
        </div>`),
      pendientes.length > 5 ? `<div style="font-size:12px;color:var(--txt2);text-align:center;padding:8px;">+${pendientes.length-5} más · <a href="/menu.html" style="color:var(--g);">Ver lista</a></div>` : ''
    ].join('');
  });
}

// ── CHAT ──
function escucharChat() {
  const q = query(collection(db, 'conversaciones'), where('hogarId', '==', hogarId));
  onSnapshot(q, (convSnap) => {
    if (convSnap.empty) { renderChat([], 0); return; }
    const conv = convSnap.docs[0];
    const noLeidos = conv.data().noLeidos || 0;
    document.getElementById('mnMensajes').textContent = noLeidos || '0';

    const qMsgs = query(collection(db, 'conversaciones', conv.id, 'mensajes'), orderBy('timestamp', 'asc'));
    onSnapshot(qMsgs, (msgsSnap) => {
      const msgs = msgsSnap.docs.map(d => d.data()).slice(-5);
      renderChat(msgs, noLeidos);
    });
  });
}

function renderChat(msgs, noLeidos) {
  document.getElementById('badgeChat').textContent = noLeidos > 0 ? `${noLeidos} sin leer` : 'Al día';

  if (!msgs.length) {
    document.getElementById('bodyChat').innerHTML = `<div class="empty-item">Sin mensajes aún</div>`;
    return;
  }

  document.getElementById('bodyChat').innerHTML = msgs.map(m => {
    const esPropio = m.remitenteUid === uid;
    const texto = m.tipo === 'texto' ? m.texto :
                  m.tipo === 'foto' ? '📷 Foto enviada' :
                  m.tipo === 'audio' ? '🎙️ Mensaje de voz' :
                  m.tipo === 'tarea' ? `📋 Tarea: ${m.tarea?.nombre || ''}` :
                  m.tipo === 'mercado' ? '🛒 Lista del mercado' : m.texto || '';
    return `<div class="item-row">
      <div class="item-emoji">${esPropio ? '👤' : '🏠'}</div>
      <div class="item-info">
        <div class="item-nombre">${texto}</div>
        <div class="item-sub">${m.remitenteNombre || ''}</div>
      </div>
      ${!m.leido && !esPropio ? '<div class="item-badge info">Nuevo</div>' : ''}
    </div>`;
  }).join('') + `<div style="text-align:center;padding:8px;"><a href="/chat.html" style="font-size:12px;color:var(--g);">Ir al chat →</a></div>`;
}

// ── ALERTAS ──
function renderAlertas() {
  const alertas = estadoData.alertas;
  const sec = document.getElementById('secAlertas');
  if (!alertas.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('badgeAlertas').textContent = `${alertas.length}`;
  document.getElementById('bodyAlertas').innerHTML = alertas.map(a => `
    <div class="item-row">
      <div class="item-info">
        <div class="item-nombre">${a.texto}</div>
        <div class="item-sub">${a.sub || ''}</div>
      </div>
    </div>`).join('');
}

// ── ESTADO GENERAL ──
function actualizarEstadoGeneral() {
  const tareas = estadoData.tareas;
  const total = tareas.length;
  const hechas = tareas.filter(t => t.estado === 'completa').length;
  const pct = total ? Math.round((hechas / total) * 100) : 100;

  document.getElementById('statusPct').textContent = pct + '%';

  let color, titulo, emoji, mensaje;
  if (pct === 100 && total > 0) {
    color = '#1A6B52'; titulo = 'Hogar al día 🎉';
    emoji = '✨'; mensaje = 'Todas las tareas del día están listas. Tu hogar está funcionando perfecto.';
  } else if (pct >= 70) {
    color = '#2D8A6A'; titulo = 'Todo va bien';
    emoji = '🌿'; mensaje = `${total - hechas} tarea${total-hechas>1?'s':''} pendiente${total-hechas>1?'s':''}. Todo bajo control.`;
  } else if (pct >= 40) {
    color = '#B45309'; titulo = 'En progreso';
    emoji = '⚡'; mensaje = `Quedan ${total - hechas} tareas por completar hoy. Buen ritmo.`;
  } else {
    color = '#B91C1C'; titulo = 'Día comenzando';
    emoji = '☀️'; mensaje = total ? `${total} tareas planificadas hoy. ¡A empezar!` : 'No hay tareas asignadas hoy.';
  }

  document.getElementById('statusCircle').style.background = color + '33';
  document.getElementById('statusCircle').style.borderColor = color + '66';
  document.getElementById('statusTitulo').textContent = titulo;

  const resumen = document.getElementById('resumenBox');
  resumen.style.display = 'flex';
