[functions]
  directory = "netlify/functions"

[build]
  environment = { SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY", SECRETS_SCAN_SMART_DETECTION_ENABLED = "false" }

[build]
  functions = "netlify/functions"

[functions."send-recordatorios"]
  schedule = "0 12 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
