<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Nana — Confianza del Hogar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#1A6B52;--g2:#0F4A38;--g3:#F0F7F4;--g4:#E1F0EB;--b:#D4A5A5;--b2:#BF9090;--b3:#F7EFEF;--cr:#F9F5F0;--txt:#1A2E25;--txt2:#4A6358;--r:16px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;}

.app-header{background:var(--g2);padding:48px 20px 20px;position:sticky;top:0;z-index:50;}
@media(min-width:768px){.app-header{padding-top:20px;}}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.header-logo{font-family:'Cormorant Garamond',serif;font-size:20px;color:#fff;text-decoration:none;}
.header-logo em{color:var(--b);font-style:normal;}
.header-back{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-size:13px;padding:7px 14px;border-radius:99px;text-decoration:none;}

/* HERO */
.hero{background:var(--g2);padding:0 20px 28px;text-align:center;}
.nana-av{width:72px;height:72px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#fff;margin:0 auto 12px;border:3px solid var(--b);}
.nana-nm{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;margin-bottom:4px;}
.nana-stars-big{font-size:22px;color:#FAC775;letter-spacing:2px;margin-bottom:6px;}
.nana-score-big{font-family:'Cormorant Garamond',serif;font-size:40px;color:#fff;font-weight:600;line-height:1;}
.nana-score-label{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}

/* MINI STATS */
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.mini-stat{background:#fff;border-radius:12px;padding:12px;text-align:center;border:1px solid var(--g4);}
.mini-stat-n{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--g);}
.mini-stat-l{font-size:10px;color:var(--txt2);margin-top:2px;}

/* LAYOUT */
.layout{max-width:600px;margin:0 auto;padding:16px;}

/* CARD */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--g4);overflow:hidden;margin-bottom:12px;}
.card-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--g4);}
.card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.card-title{font-size:14px;font-weight:600;color:var(--txt);}
.card-sub{font-size:12px;color:var(--txt2);margin-top:2px;}
.card-badge{margin-left:auto;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
.card-body{padding:16px;}

/* CALIFICACIÓN */
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--g4);}
.cat-row:last-child{border-bottom:none;}
.cat-label{font-size:13px;color:var(--txt);display:flex;align-items:center;gap:8px;}
.stars-row{display:flex;gap:6px;}
.star-btn{background:none;border:none;font-size:24px;cursor:pointer;line-height:1;padding:2px;transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.star-btn:active{transform:scale(1.3);}

/* HISTORIAL */
.hist-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--g4);}
.hist-item:last-child{border-bottom:none;}
.hist-score{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--g);width:36px;text-align:center;flex-shrink:0;}
.hist-info{flex:1;}
.hist-semana{font-size:12px;font-weight:600;color:var(--txt);}
.hist-stars{font-size:13px;color:#FAC775;}
.hist-nota{font-size:11px;color:var(--txt2);margin-top:2px;font-style:italic;}

/* RECONOCIMIENTOS */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.badge-item{background:var(--g3);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--g4);}
.badge-emoji{font-size:26px;margin-bottom:6px;}
.badge-label{font-size:10px;font-weight:600;color:var(--g);line-height:1.3;}

/* NOTA */
.nota-input{width:100%;border:1.5px solid var(--g4);border-radius:12px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--txt);background:#fff;resize:none;outline:none;}
.nota-input:focus{border-color:var(--g);}

/* BTN */
.btn-primary{background:var(--g);color:#fff;border:none;border-radius:99px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:background .2s;}
.btn-primary:hover{background:var(--g2);}
.btn-primary:disabled{background:#bbb;cursor:not-allowed;}

/* YA CALIFICADO */
.ya-calificado{background:var(--g3);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--g4);}
.ya-cal-ico{font-size:32px;margin-bottom:8px;}
.ya-cal-txt{font-size:14px;font-weight:600;color:var(--g);}
.ya-cal-sub{font-size:12px;color:var(--txt2);margin-top:4px;}

/* FAB */
.fab-back{position:fixed;bottom:24px;right:20px;background:var(--g);color:#fff;border:none;border-radius:99px;padding:12px 20px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(26,107,82,.3);z-index:50;}

/* EMPTY */
.empty{text-align:center;padding:24px;color:#bbb;font-size:13px;}

/* LOADING */
.loading{text-align:center;padding:32px;color:#bbb;font-size:13px;}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-row">
    <a href="/app.html" class="header-logo">My <em>Nana</em></a>
    <a href="/app.html" class="header-back">← Dashboard</a>
  </div>
</div>

<!-- Hero nana -->
<div class="hero">
  <div class="nana-av" id="heroAv">N</div>
  <div class="nana-nm" id="heroNombre">Cargando...</div>
  <div class="nana-stars-big" id="heroStars">☆☆☆☆☆</div>
  <div class="nana-score-big" id="heroScore">—</div>
  <div class="nana-score-label">Score de confianza</div>
</div>

<div class="layout">

  <!-- Mini stats -->
  <div class="mini-stats">
    <div class="mini-stat">
      <div class="mini-stat-n" id="mnSemanas">—</div>
      <div class="mini-stat-l">Semanas trabajadas</div>
    </div>
    <div class="mini-stat">
      <div class="mini-stat-n" id="mnReviews">—</div>
      <div class="mini-stat-l">Reconocimientos</div>
    </div>
    <div class="mini-stat">
      <div class="mini-stat-n" id="mnRacha">—</div>
      <div class="mini-stat-l">Racha actual</div>
    </div>
  </div>

  <!-- Bloque principal -->
  <div id="mainBlock">
    <div class="loading">⏳ Cargando información...</div>
  </div>

  <!-- Historial -->
  <div class="card" id="cardHistorial" style="display:none;">
    <div class="card-header">
      <div class="card-icon" style="background:var(--g3);">📊</div>
      <div>
        <div class="card-title">Historial de evaluaciones</div>
        <div class="card-sub" id="subHistorial">Semanas anteriores</div>
      </div>
    </div>
    <div class="card-body" id="bodyHistorial">
      <div class="empty">Sin historial todavía</div>
    </div>
  </div>

  <!-- Reconocimientos -->
  <div class="card" id="cardBadges" style="display:none;">
    <div class="card-header">
      <div class="card-icon" style="background:var(--b3);">🏆</div>
      <div>
        <div class="card-title">Reconocimientos obtenidos</div>
        <div class="card-sub" id="subBadges">Logros de tu nana</div>
      </div>
    </div>
    <div class="card-body">
      <div class="badge-grid" id="badgeGrid"></div>
    </div>
  </div>

  <div style="height:80px;"></div>
</div>

<button class="fab-back" onclick="location.href='/app.html'">← Volver al dashboard</button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import {
  getFirestore, doc, getDoc, setDoc, addDoc, updateDoc,
  collection, query, where, getDocs, orderBy, limit,
  serverTimestamp, increment
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyBmWyBfbhRSp0mOoAFfhWwNRSHWpBKNM7s",
  authDomain: "mynanapanama.firebaseapp.com",
  projectId: "mynanapanama",
  storageBucket: "mynanapanama.appspot.com",
  messagingSenderId: "419056770982",
  appId: "1:419056770982:web:dc74b5abb4b99c9b3cd3b7"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Estado ──
let me = null, nanaUid = null, nanaData = null;
let hogarId = null;
let yaCalificadoEstaSemana = false;

// Categorías de evaluación
const CATEGORIAS = [
  { id: 'puntualidad',  emoji: '⏰', label: 'Puntualidad'       },
  { id: 'limpieza',     emoji: '🧹', label: 'Limpieza'          },
  { id: 'cocina',       emoji: '🍲', label: 'Cocina'            },
  { id: 'actitud',      emoji: '😊', label: 'Actitud'           },
  { id: 'confianza',    emoji: '🔒', label: 'Confianza general'  },
];

// Estado de estrellas por categoría
const ratings = {};
CATEGORIAS.forEach(c => ratings[c.id] = 0);

// Semana actual como ID
function getSemanaId() {
  const hoy = new Date();
  const dia = hoy.getDay() === 0 ? 6 : hoy.getDay() - 1;
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - dia);
  return `${lunes.getFullYear()}-${String(lunes.getMonth()+1).padStart(2,'0')}-${String(lunes.getDate()).padStart(2,'0')}`;
}

function semanaLabel(id) {
  // id = "2026-05-25" → "Semana del 25 de mayo"
  const d = new Date(id + 'T12:00:00');
  return `Semana del ${d.getDate()} de ${d.toLocaleString('es', { month: 'long' })}`;
}

// ── Inicializar ──
onAuthStateChanged(auth, async user => {
  if (!user) { location.href = '/app.html'; return; }
  const perfil = await getDoc(doc(db, 'usuarios', user.uid));
  if (!perfil.exists()) { location.href = '/app.html'; return; }
  if (perfil.data().tipo !== 'familia') { location.href = '/app.html'; return; }
  me = user;
  await cargarDatos();
});

async function cargarDatos() {
  // Buscar hogar y nana
  const qHogar = query(collection(db,'hogares'), where('participantes','array-contains', me.uid));
  const snapHogar = await getDocs(qHogar);
  if (snapHogar.empty) { mostrarSinNana(); return; }

  hogarId = snapHogar.docs[0].id;
  const participantes = snapHogar.docs[0].data().participantes || [];

  for (const uid of participantes) {
    if (uid === me.uid) continue;
    const p = await getDoc(doc(db,'usuarios',uid));
    if (p.exists() && p.data().tipo === 'nana') {
      nanaUid = uid;
      nanaData = p.data();
      break;
    }
  }

  if (!nanaUid) { mostrarSinNana(); return; }

  // Hero
  const inicial = nanaData.nombre?.[0]?.toUpperCase() || 'N';
  document.getElementById('heroAv').textContent     = inicial;
  document.getElementById('heroNombre').textContent = nanaData.nombre || 'Tu nana';

  // Score actual
  const scoreSnap = await getDoc(doc(db,'scores',nanaUid));
  const scoreData  = scoreSnap.exists() ? scoreSnap.data() : {};
  const scoreActual = scoreData.scoreActual || 0;
  const semanas     = scoreData.semanasTrabajadas || 0;
  const reviews     = scoreData.totalReviews || 0;
  const racha       = scoreData.rachaActual || 0;

  actualizarHero(scoreActual);
  document.getElementById('mnSemanas').textContent = semanas;
  document.getElementById('mnReviews').textContent = reviews;
  document.getElementById('mnRacha').textContent   = racha > 0 ? `${racha} sem.` : '—';

  // Verificar si ya calificó esta semana
  const semanaId = getSemanaId();
  const calSnap = await getDoc(doc(db,'scores',nanaUid,'calificaciones_semana',`${semanaId}_${me.uid}`));
  yaCalificadoEstaSemana = calSnap.exists();

  // Renderizar bloque principal
  renderMainBlock();

  // Historial
  await cargarHistorial();

  // Reconocimientos
  renderBadges(scoreData);
}

function actualizarHero(score) {
  const s = parseFloat(score) || 0;
  document.getElementById('heroScore').textContent = s > 0 ? s.toFixed(1) : '—';
  const filled = Math.round(s);
  document.getElementById('heroStars').textContent = '★'.repeat(filled) + '☆'.repeat(5-filled);
}

function mostrarSinNana() {
  document.getElementById('heroNombre').textContent = 'Sin nana vinculada';
  document.getElementById('mainBlock').innerHTML = `
    <div class="card">
      <div class="card-body">
        <div class="empty">
          🔗 Vincula a tu nana para poder evaluarla semanalmente.<br><br>
          <a href="/app.html" style="color:var(--g);font-weight:600;">← Volver al dashboard</a>
        </div>
      </div>
    </div>`;
}

// ── Formulario de calificación ──
function renderMainBlock() {
  const semanaId = getSemanaId();
  const semLabel = semanaLabel(semanaId);

  if (yaCalificadoEstaSemana) {
    document.getElementById('mainBlock').innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-icon" style="background:var(--g3);">🌟</div>
          <div>
            <div class="card-title">Calificación semanal</div>
            <div class="card-sub">${semLabel}</div>
          </div>
          <div class="card-badge" style="background:var(--g3);color:var(--g);">Enviada</div>
        </div>
        <div class="card-body">
          <div class="ya-calificado">
            <div class="ya-cal-ico">✅</div>
            <div class="ya-cal-txt">Ya evaluaste a ${nanaData.nombre?.split(' ')[0] || 'tu nana'} esta semana</div>
            <div class="ya-cal-sub">Puedes volver a calificar la próxima semana.<br>¡Gracias por reconocer su trabajo!</div>
          </div>
        </div>
      </div>`;
    return;
  }

  // Formulario
  const catRows = CATEGORIAS.map(c => `
    <div class="cat-row">
      <div class="cat-label"><span>${c.emoji}</span> ${c.label}</div>
      <div class="stars-row" id="stars_${c.id}">
        ${[1,2,3,4,5].map(n => `
          <button class="star-btn" onclick="setRating('${c.id}',${n})" title="${n} estrella${n>1?'s':''}">☆</button>
        `).join('')}
      </div>
    </div>`).join('');

  document.getElementById('mainBlock').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:var(--g3);">🌟</div>
        <div>
          <div class="card-title">Calificar esta semana</div>
          <div class="card-sub">${semLabel}</div>
        </div>
      </div>
      <div class="card-body">
        <p style="font-size:13px;color:var(--txt2);margin-bottom:16px;line-height:1.5;">
          Evalúa el trabajo de <strong>${nanaData.nombre?.split(' ')[0] || 'tu nana'}</strong> durante esta semana. 
          Tu calificación impacta su score de confianza.
        </p>
        ${catRows}
        <div style="margin-top:16px;">
          <label style="font-size:12px;color:var(--txt2);font-weight:600;margin-bottom:6px;display:block;">Nota o reconocimiento (opcional)</label>
          <textarea class="nota-input" id="notaInput" rows="3" placeholder="Ej: Excelente semana, muy puntual y ordenada 🌟"></textarea>
        </div>
        <div style="margin-top:14px;">
          <button class="btn-primary" id="btnEnviar" onclick="enviarCalificacion()">Enviar calificación</button>
        </div>
        <p style="font-size:11px;color:#bbb;text-align:center;margin-top:10px;">Solo puedes calificar una vez por semana</p>
      </div>
    </div>`;
}

// ── Estrellas interactivas ──
window.setRating = (catId, valor) => {
  ratings[catId] = valor;
  const container = document.getElementById(`stars_${catId}`);
  if (!container) return;
  container.querySelectorAll('.star-btn').forEach((btn, idx) => {
    btn.textContent = idx < valor ? '★' : '☆';
    btn.style.color = idx < valor ? '#FAC775' : '#ccc';
  });
};

// ── Enviar calificación ──
window.enviarCalificacion = async () => {
  const valores = Object.values(ratings);
  const sinCalificar = valores.filter(v => v === 0).length;
  if (sinCalificar === CATEGORIAS.length) {
    showToast('⭐ Toca las estrellas para calificar cada categoría');
    return;
  }

  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const semanaId = getSemanaId();
    const nota = document.getElementById('notaInput').value.trim();
    const conValor = valores.filter(v => v > 0);
    const promedio = conValor.length
      ? Math.round((conValor.reduce((a,b) => a+b, 0) / conValor.length) * 10) / 10
      : 0;

    const calificacion = {
      semanaId,
      familiaUid: me.uid,
      nanaUid,
      ratings: { ...ratings },
      promedio,
      nota,
      creadoA: serverTimestamp(),
    };

    // Guardar calificación de la semana
    await setDoc(
      doc(db,'scores',nanaUid,'calificaciones_semana',`${semanaId}_${me.uid}`),
      calificacion
    );

    // Guardar en historial
    await addDoc(collection(db,'scores',nanaUid,'historial'), {
      ...calificacion,
      tipo: 'calificacion_semanal',
    });

    // Actualizar score global de la nana
    const scoreRef = doc(db,'scores',nanaUid);
    const scoreSnap = await getDoc(scoreRef);
    if (scoreSnap.exists()) {
      const sd = scoreSnap.data();
      const totalAnt = (sd.scoreActual || 0) * (sd.totalReviews || 0);
      const nuevo = sd.totalReviews > 0
        ? Math.round(((totalAnt + promedio) / (sd.totalReviews + 1)) * 10) / 10
        : promedio;
      await updateDoc(scoreRef, {
        scoreActual:       nuevo,
        totalReviews:      increment(1),
        semanasTrabajadas: increment(1),
        rachaActual:       increment(1),
        ultimaCalificacion: serverTimestamp(),
      });
      actualizarHero(nuevo);
    } else {
      await setDoc(scoreRef, {
        scoreActual:       promedio,
        totalReviews:      1,
        semanasTrabajadas: 1,
        rachaActual:       1,
        ultimaCalificacion: serverTimestamp(),
        nanaUid,
      });
      actualizarHero(promedio);
    }

    yaCalificadoEstaSemana = true;
    renderMainBlock();
    await cargarHistorial();
    showToast('🌟 ¡Calificación enviada! Gracias por reconocer su trabajo.');

  } catch(e) {
    console.error('[Score]', e);
    showToast('❌ Error al enviar. Intenta de nuevo.');
    btn.disabled = false;
    btn.textContent = 'Enviar calificación';
  }
};

// ── Historial ──
async function cargarHistorial() {
  try {
    const q = query(
      collection(db,'scores',nanaUid,'calificaciones_semana'),
      orderBy('semanaId','desc'),
      limit(8)
    );
    const snap = await getDocs(q);
    const card = document.getElementById('cardHistorial');
    const body = document.getElementById('bodyHistorial');
    if (snap.empty) { card.style.display = 'none'; return; }

    card.style.display = 'block';
    document.getElementById('subHistorial').textContent =
      `${snap.docs.length} semana${snap.docs.length > 1 ? 's' : ''} evaluada${snap.docs.length > 1 ? 's' : ''}`;

    body.innerHTML = snap.docs.map(d => {
      const data = d.data();
      const prom = data.promedio || 0;
      const filled = Math.round(prom);
      const stars = '★'.repeat(filled) + '☆'.repeat(5-filled);
      const label = semanaLabel(data.semanaId || d.id.split('_')[0]);
      return `
        <div class="hist-item">
          <div class="hist-score">${prom.toFixed(1)}</div>
          <div class="hist-info">
            <div class="hist-semana">${label}</div>
            <div class="hist-stars">${stars}</div>
            ${data.nota ? `<div class="hist-nota">"${data.nota}"</div>` : ''}
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    console.warn('[Score] Historial:', e.message);
  }
}

// ── Reconocimientos / Badges ──
function renderBadges(scoreData) {
  const BADGES = [
    { id:'puntual',   emoji:'⏰', label:'Súper puntual',    cond: (s) => s.rachaActual >= 4 },
    { id:'confiable', emoji:'🔒', label:'Muy confiable',    cond: (s) => (s.scoreActual || 0) >= 4.5 },
    { id:'constante', emoji:'💪', label:'Constante',        cond: (s) => (s.semanasTrabajadas || 0) >= 8 },
    { id:'estelar',   emoji:'🌟', label:'Trabajadora estelar', cond: (s) => (s.scoreActual || 0) === 5 },
    { id:'mes',       emoji:'📅', label:'1 mes completo',   cond: (s) => (s.semanasTrabajadas || 0) >= 4 },
    { id:'trimestre', emoji:'🏆', label:'3 meses',          cond: (s) => (s.semanasTrabajadas || 0) >= 12 },
  ];

  const ganados = BADGES.filter(b => b.cond(scoreData));
  if (ganados.length === 0) return;

  document.getElementById('cardBadges').style.display = 'block';
  document.getElementById('subBadges').textContent =
    `${ganados.length} reconocimiento${ganados.length > 1 ? 's' : ''} obtenido${ganados.length > 1 ? 's' : ''}`;

  document.getElementById('badgeGrid').innerHTML = ganados.map(b => `
    <div class="badge-item">
      <div class="badge-emoji">${b.emoji}</div>
      <div class="badge-label">${b.label}</div>
    </div>`).join('');
}

// ── Toast ──
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--g2);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}
</script>
